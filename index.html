<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 가상 서재</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ===== Reset & Variables ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #110b05;
  --bg2:         #1a1008;
  --wood-dark:   #2e1a08;
  --wood-mid:    #4a2810;
  --wood-light:  #6b3a18;
  --wood-edge:   #8b5a28;
  --gold:        #c9a84c;
  --gold-light:  #e8c870;
  --gold-dim:    rgba(201,168,76,0.35);
  --text:        #ecdec0;
  --text-dim:    #7a6848;
  --text-mid:    #a89060;
  --overlay:     rgba(8,4,1,0.97);
  --panel-bg:    #0e0904;
  --panel-bg2:   #130c06;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Times New Roman', serif;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(80,40,10,0.4) 0%, transparent 60%);
}

/* ===== Scrollbars ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.55); }

/* ===== Header ===== */
.lib-header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 48px;
  background: linear-gradient(180deg, rgba(8,4,1,0.98) 0%, rgba(17,11,5,0.92) 100%);
  border-bottom: 1px solid var(--gold-dim);
  backdrop-filter: blur(8px);
}

.lib-logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.lib-logo-icon {
  font-size: 28px;
  filter: drop-shadow(0 0 8px rgba(201,168,76,0.5));
}

.lib-title {
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--gold);
  text-shadow: 0 0 24px rgba(201,168,76,0.35);
  font-weight: normal;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.book-count-badge {
  font-size: 12px;
  color: var(--text-mid);
  background: rgba(201,168,76,0.08);
  border: 1px solid var(--gold-dim);
  padding: 5px 14px;
  border-radius: 20px;
  letter-spacing: 1px;
}

.import-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  background: linear-gradient(135deg, #7a5810 0%, #c9a84c 100%);
  color: #1a1008;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.25s;
  box-shadow: 0 2px 12px rgba(201,168,76,0.3);
}

.import-btn:hover {
  background: linear-gradient(135deg, #c9a84c 0%, #e8c870 100%);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(201,168,76,0.45);
}

.import-btn:active { transform: translateY(0); }

#folderInput { display: none; }

/* ===== Bookshelf Container ===== */
.bookshelf-wrap {
  padding: 32px 40px 60px;
  min-height: calc(100vh - 72px);
}

/* ===== Empty State ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 65vh;
  gap: 18px;
  text-align: center;
  animation: fadeUp 0.6s ease;
}

.empty-icon-wrap {
  font-size: 90px;
  filter: drop-shadow(0 4px 16px rgba(201,168,76,0.2));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}

.empty-title {
  font-size: 22px;
  color: var(--gold);
  opacity: 0.7;
  letter-spacing: 2px;
}

.empty-desc {
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.8;
}

.empty-arrow {
  font-size: 28px;
  color: var(--gold-dim);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 1; }
}

/* ===== Shelf Unit ===== */
.shelf-unit { margin-bottom: 8px; }

.shelf-label {
  padding: 10px 16px 6px;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.shelf-books-row {
  display: flex;
  align-items: flex-end;
  gap: 5px;
  padding: 24px 24px 0 24px;
  min-height: 230px;
  background:
    linear-gradient(180deg, rgba(30,15,5,0.6) 0%, rgba(46,26,8,0.7) 100%);
  border-left: 5px solid var(--wood-light);
  border-right: 5px solid var(--wood-light);
  border-top: 2px solid rgba(139,90,40,0.3);
  flex-wrap: nowrap;
  overflow: hidden;
}

.shelf-plank {
  height: 26px;
  background:
    linear-gradient(0deg,
      #1e0e04 0%, var(--wood-dark) 30%, var(--wood-mid) 55%,
      var(--wood-light) 72%, #9b6830 85%, var(--wood-edge) 100%
    );
  border-bottom: 3px solid #1a0c04;
  box-shadow:
    0 6px 16px rgba(0,0,0,0.7),
    0 2px 4px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,200,120,0.15);
}

.shelf-side-shadow {
  height: 10px;
  background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
  border-left: 5px solid rgba(0,0,0,0.3);
  border-right: 5px solid rgba(0,0,0,0.3);
}

/* ===== Book Spine ===== */
.book {
  position: relative;
  flex-shrink: 0;
  width: 54px;
  cursor: pointer;
  transform-origin: bottom center;
  transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  will-change: transform;
}

.book:hover { transform: translateY(-14px) scale(1.03); }
.book:hover .book-spine {
  box-shadow:
    4px 0 16px rgba(0,0,0,0.7),
    -1px 0 0 rgba(255,255,255,0.08),
    0 -6px 24px rgba(201,168,76,0.25);
}

.book-spine {
  width: 100%;
  height: 100%;
  border-radius: 2px 1px 1px 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow:
    4px 0 10px rgba(0,0,0,0.6),
    -1px 0 0 rgba(255,255,255,0.07),
    inset -4px 0 8px rgba(0,0,0,0.35),
    inset 3px 0 6px rgba(255,255,255,0.08);
  transition: box-shadow 0.22s;
}

.book-spine::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 5px; height: 100%;
  background: linear-gradient(90deg,
    rgba(0,0,0,0.45) 0%, rgba(255,255,255,0.06) 100%);
}

.book-spine::after {
  content: '';
  position: absolute;
  right: 0; top: 0;
  width: 10px; height: 100%;
  background: linear-gradient(90deg,
    transparent 0%, rgba(255,255,255,0.04) 50%, rgba(0,0,0,0.15) 100%);
}

.book-title-vert {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-size: 10.5px;
  color: rgba(255,255,255,0.88);
  text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  padding: 10px 0;
  max-height: 88%;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.8px;
  z-index: 1;
  user-select: none;
  line-height: 1.3;
}

.book-band {
  position: absolute;
  bottom: 16px;
  left: 8px; right: 8px;
  height: 1.5px;
  background: rgba(201,168,76,0.4);
  border-radius: 1px;
}

/* ===== Animated Book ===== */
#animBook {
  position: fixed;
  z-index: 2000;
  pointer-events: none;
  border-radius: 4px;
  overflow: visible;
}

#animBookCover {
  width: 100%;
  height: 100%;
  border-radius: 6px;
  transform-origin: left center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px 30px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}

#animBookCover::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent 0px, transparent 38px,
    rgba(0,0,0,0.06) 38px, rgba(0,0,0,0.06) 39px
  );
  pointer-events: none;
}

.cover-icon   { font-size: 54px; z-index: 1; }
.cover-title  {
  font-size: 18px; color: rgba(255,255,255,0.92);
  text-align: center; z-index: 1; font-family: Georgia, serif;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6); letter-spacing: 1px;
  line-height: 1.5; max-width: 340px;
}
.cover-line  {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  width: 50%; height: 2px; background: rgba(201,168,76,0.5); border-radius: 1px;
}
.cover-line2 {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  width: 30%; height: 1px; background: rgba(201,168,76,0.3); border-radius: 1px;
}

/* ===== Workspace Overlay ===== */
#workspaceOverlay {
  position: fixed;
  inset: 0;
  z-index: 1500;
  background: var(--overlay);
  display: none;
  flex-direction: column;
  opacity: 0;
}

.ws-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 28px;
  background: rgba(46,26,8,0.7);
  border-bottom: 1px solid var(--gold-dim);
  flex-shrink: 0;
  backdrop-filter: blur(4px);
}

.ws-book-title {
  font-size: 16px;
  color: var(--gold);
  letter-spacing: 2px;
  max-width: 60%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.ws-close-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 18px;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--gold-dim);
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.22s;
  font-family: Georgia, serif;
}

.ws-close-btn:hover {
  color: var(--gold);
  border-color: var(--gold);
  background: rgba(201,168,76,0.1);
}

.ws-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== PDF Panel ===== */
.pdf-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(201,168,76,0.18);
  background: var(--panel-bg);
  overflow: hidden;
}

.pdf-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 10px 16px;
  background: rgba(46,26,8,0.5);
  border-bottom: 1px solid rgba(201,168,76,0.18);
  flex-shrink: 0;
}

.pdf-btn {
  padding: 6px 18px;
  background: rgba(201,168,76,0.12);
  color: var(--gold);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  letter-spacing: 1px;
  transition: all 0.2s;
  font-family: Georgia, serif;
}

.pdf-btn:hover:not(:disabled) {
  background: rgba(201,168,76,0.3);
  box-shadow: 0 0 10px rgba(201,168,76,0.2);
}

.pdf-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.pdf-page-info {
  font-size: 13px;
  color: var(--text-mid);
  min-width: 90px;
  text-align: center;
  letter-spacing: 1px;
}

.pdf-canvas-wrap {
  flex: 1;
  overflow: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(ellipse at center, rgba(30,15,5,0.5) 0%, var(--panel-bg) 100%);
}

#pdfCanvas {
  box-shadow:
    0 4px 24px rgba(0,0,0,0.7),
    0 1px 4px rgba(0,0,0,0.5);
  display: block;
  max-width: 100%;
}

.pdf-msg {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 60px;
  color: var(--text-dim);
  font-size: 14px;
  letter-spacing: 1px;
}

/* ===== Memo Panel ===== */
.memo-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--panel-bg2);
  overflow: hidden;
}

.memo-panel-header {
  padding: 9px 14px 9px 20px;
  background: rgba(46,26,8,0.5);
  border-bottom: 1px solid rgba(201,168,76,0.18);
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ===== AI Summary ===== */
.ai-sum-btns { display: flex; gap: 6px; flex-shrink: 0; }
.memo-panel-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ai-sum-btn {
  font-family: Georgia, serif;
  font-size: 10.5px;
  letter-spacing: 0.5px;
  text-transform: none;
  padding: 5px 11px;
  border-radius: 5px;
  cursor: pointer;
  color: #1a1008;
  background: linear-gradient(135deg, #7a5810 0%, #c9a84c 100%);
  border: none;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(201,168,76,0.25);
  white-space: nowrap;
}
.ai-sum-btn:hover:not(:disabled) {
  background: linear-gradient(135deg, #c9a84c 0%, #e8c870 100%);
  transform: translateY(-1px);
}
.ai-sum-btn:disabled { opacity: 0.55; cursor: progress; }

.ai-sum-box {
  display: none;
  margin: 14px 16px 0;
  background: rgba(40,52,80,0.28);
  border: 1px solid rgba(120,150,210,0.35);
  border-left: 3px solid #6f8fd6;
  border-radius: 6px;
  padding: 11px 13px;
  flex-shrink: 0;
  animation: slideIn 0.28s ease;
}
.ai-sum-box.error {
  background: rgba(80,40,20,0.3);
  border-color: rgba(210,130,90,0.4);
  border-left-color: #d2825a;
}
.ai-sum-box-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 7px;
}
.ai-sum-badge {
  font-size: 10.5px;
  letter-spacing: 1px;
  color: #aec0ee;
}
.ai-sum-box.error .ai-sum-badge { color: #f0b890; }
.ai-sum-actions { display: flex; gap: 6px; }
.ai-sum-act {
  font-family: Georgia, serif;
  font-size: 10.5px;
  padding: 3px 9px;
  border-radius: 4px;
  cursor: pointer;
  background: rgba(120,150,210,0.15);
  color: #cdd9f3;
  border: 1px solid rgba(120,150,210,0.3);
  transition: all 0.2s;
}
.ai-sum-act:hover { background: rgba(120,150,210,0.3); }
.ai-sum-content {
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
}
.ai-sum-loading { color: var(--text-mid); font-style: italic; font-size: 12.5px; }

.memo-input-section {
  padding: 16px;
  border-bottom: 1px solid rgba(201,168,76,0.12);
  flex-shrink: 0;
}

.memo-page-tag {
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 1px;
  margin-bottom: 8px;
  opacity: 0.8;
}

.memo-textarea {
  width: 100%;
  height: 108px;
  background: rgba(46,26,8,0.5);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 5px;
  color: var(--text);
  font-size: 13.5px;
  padding: 11px 13px;
  resize: none;
  font-family: Georgia, serif;
  line-height: 1.65;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.memo-textarea:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 10px rgba(201,168,76,0.18);
}

.memo-textarea::placeholder { color: var(--text-dim); }

.memo-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
}

.memo-shortcut {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.memo-save-btn {
  padding: 7px 20px;
  background: linear-gradient(135deg, #7a5810 0%, #c9a84c 100%);
  color: #1a1008;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  transition: all 0.2s;
  font-family: Georgia, serif;
}

.memo-save-btn:hover {
  background: linear-gradient(135deg, #c9a84c 0%, #e8c870 100%);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(201,168,76,0.3);
}

.memo-list-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.memo-empty-msg {
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  padding: 48px 20px;
  line-height: 1.9;
  opacity: 0.6;
}

.memo-card {
  background: rgba(46,26,8,0.55);
  border: 1px solid rgba(201,168,76,0.14);
  border-left: 3px solid var(--gold-dim);
  border-radius: 4px;
  padding: 11px 38px 11px 13px;
  position: relative;
  cursor: pointer;
  animation: slideIn 0.28s ease;
  transition: border-color 0.2s, background 0.2s;
}

.memo-card:hover {
  border-color: rgba(201,168,76,0.3);
  border-left-color: var(--gold);
  background: rgba(46,26,8,0.75);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.memo-card-tag {
  font-size: 10.5px;
  color: var(--gold);
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.memo-card-jump {
  float: right;
  font-size: 10px;
  color: var(--gold-light);
  opacity: 0;
  transition: opacity 0.2s;
  letter-spacing: 0.5px;
}
.memo-card:hover .memo-card-jump { opacity: 0.85; }

.memo-card-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}

.memo-card-del {
  position: absolute;
  top: 9px; right: 10px;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 50%;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.2s, background 0.2s, color 0.2s;
}

.memo-card:hover .memo-card-del { opacity: 1; }
.memo-card-del:hover { background: rgba(255,80,80,0.2); color: #ff7070; }

/* ===== Toast ===== */
#toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: rgba(46,26,8,0.97);
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 11px 22px;
  border-radius: 7px;
  font-size: 13px;
  letter-spacing: 1px;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.3s, transform 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

#toast.show { opacity: 1; transform: translateY(0); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- Header -->
<header class="lib-header">
  <div class="lib-logo">
    <span class="lib-logo-icon">📚</span>
    <div>
      <div class="lib-title">나의 가상 서재</div>
      <div style="font-size:10px;letter-spacing:3px;color:var(--text-dim);margin-top:2px;">MY VIRTUAL LIBRARY</div>
    </div>
  </div>
  <div class="header-right">
    <span class="book-count-badge" id="bookCountBadge">책 0권</span>
    <button class="import-btn" onclick="document.getElementById('folderInput').click()">
      ＋ 폴더 추가
    </button>
    <input type="file" id="folderInput" webkitdirectory multiple>
  </div>
</header>

<!-- Bookshelf -->
<div class="bookshelf-wrap" id="bookshelfWrap">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon-wrap">📖</div>
    <div class="empty-title">서재가 비어 있습니다</div>
    <div class="empty-desc">
      우측 상단 <strong style="color:var(--gold)">폴더 추가</strong> 버튼으로<br>
      PDF 파일이 담긴 폴더를 불러오세요

<script>
/* =============================================================
   IndexedDB Helpers
   ============================================================= */
const DB_NAME    = 'VirtualLibraryDB_v2';
const DB_VERSION = 1;
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = ev => {
      const d = ev.target.result;
      if (!d.objectStoreNames.contains('books')) {
        d.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
      }
      if (!d.objectStoreNames.contains('memos')) {
        const ms = d.createObjectStore('memos', { keyPath: 'id', autoIncrement: true });
        ms.createIndex('byBook', 'bookId');
      }
    };

    req.onsuccess = ev => { db = ev.target.result; res(db); };
    req.onerror   = ev => rej(ev.target.error);
  });
}

function idbAdd(store, data) {
  return new Promise((res, rej) => {
    const r = db.transaction(store, 'readwrite').objectStore(store).add(data);
    r.onsuccess = ev => res(ev.target.result);
    r.onerror   = ev => rej(ev.target.error);
  });
}

function idbGetAll(store) {
  return new Promise((res, rej) => {
    const r = db.transaction(store, 'readonly').objectStore(store).getAll();
    r.onsuccess = ev => res(ev.target.result);
    r.onerror   = ev => rej(ev.target.error);
  });
}

function idbGet(store, id) {
  return new Promise((res, rej) => {
    const r = db.transaction(store, 'readonly').objectStore(store).get(id);
    r.onsuccess = ev => res(ev.target.result);
    r.onerror   = ev => rej(ev.target.error);
  });
}

function idbDelete(store, id) {
  return new Promise((res, rej) => {
    const r = db.transaction(store, 'readwrite').objectStore(store).delete(id);
    r.onsuccess = () => res();
    r.onerror   = ev => rej(ev.target.error);
  });
}

function idbGetByIndex(store, indexName, val) {
  return new Promise((res, rej) => {
    const os = db.transaction(store, 'readonly').objectStore(store);
    const r  = os.index(indexName).getAll(IDBKeyRange.only(val));
    r.onsuccess = ev => res(ev.target.result);
    r.onerror   = ev => rej(ev.target.error);
  });
}

/* =============================================================
   App State
   ============================================================= */
let books       = [];
let currentBook = null;
let currentPage = 1;
let totalPages  = 1;
let pdfDoc      = null;
let rendering   = false;
let pendingPage = null;

/* =============================================================
   PDF.js worker
   ============================================================= */
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* =============================================================
   Book visual palette
   ============================================================= */
const PALETTES = [
  'linear-gradient(155deg,#7a1c2e 0%,#420e18 100%)',
  'linear-gradient(155deg,#1c3a7a 0%,#0e1e44 100%)',
  'linear-gradient(155deg,#1a5c38 0%,#0c3520 100%)',
  'linear-gradient(155deg,#5c3a1a 0%,#361e08 100%)',
  'linear-gradient(155deg,#4a1c6b 0%,#2a0e40 100%)',
  'linear-gradient(155deg,#6b5a1a 0%,#3e3408 100%)',
  'linear-gradient(155deg,#1a5a6b 0%,#0c3440 100%)',
  'linear-gradient(155deg,#6b1a4a 0%,#40102c 100%)',
  'linear-gradient(155deg,#2c5a1a 0%,#16360c 100%)',
  'linear-gradient(155deg,#1a3c6b 0%,#0c2040 100%)',
];

const BOOK_HEIGHTS = [168, 185, 175, 192, 160, 180, 195, 163, 177, 188, 165, 183];

/* =============================================================
   Render Bookshelf
   ============================================================= */
const BOOKS_PER_SHELF = 9;

function renderBookshelf() {
  const wrap = document.getElementById('bookshelfWrap');
  document.getElementById('bookCountBadge').textContent = `책 ${books.length}권`;

  if (!books.length) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon-wrap">📖</div>
        <div class="empty-title">서재가 비어 있습니다</div>
        <div class="empty-desc">
          우측 상단 <strong style="color:var(--gold)">폴더 추가</strong> 버튼으로<br>
          PDF 파일이 담긴 폴더를 불러오세요
        </div>
        <div class="empty-arrow">↗</div>
      </div>`;
    return;
  }

  wrap.innerHTML = '';

  // Split into shelf rows
  for (let si = 0; si * BOOKS_PER_SHELF < books.length; si++) {
    const shelfBooks = books.slice(si * BOOKS_PER_SHELF, (si + 1) * BOOKS_PER_SHELF);

    const unit  = document.createElement('div');
    unit.className = 'shelf-unit';

    const lbl = document.createElement('div');
    lbl.className   = 'shelf-label';
    lbl.textContent = `Shelf ${si + 1}`;
    unit.appendChild(lbl);

    const row = document.createElement('div');
    row.className = 'shelf-books-row';

    shelfBooks.forEach((book, bi) => {
      const gi     = si * BOOKS_PER_SHELF + bi;
      const bg     = PALETTES[gi % PALETTES.length];
      const height = BOOK_HEIGHTS[gi % BOOK_HEIGHTS.length];
      const title  = book.name.replace(/\.pdf$/i, '');

      const el = document.createElement('div');
      el.className   = 'book';
      el.dataset.bid = book.id;
      el.style.height = height + 'px';
      el.innerHTML = `
        <div class="book-spine" style="background:${bg};">
          <span class="book-title-vert">${escHtml(title)}</span>
          <div class="book-band"></div>
        </div>`;
      el.addEventListener('click', () => openBook(book, el));
      row.appendChild(el);
    });

    unit.appendChild(row);

    const plank = document.createElement('div');
    plank.className = 'shelf-plank';
    unit.appendChild(plank);

    const shadow = document.createElement('div');
    shadow.className = 'shelf-side-shadow';
    unit.appendChild(shadow);

    wrap.appendChild(unit);
  }
}

/* =============================================================
   Folder import
   ============================================================= */
document.getElementById('folderInput').addEventListener('change', async e => {
  const files = Array.from(e.target.files)
    .filter(f => f.name.toLowerCase().endsWith('.pdf'));
  e.target.value = '';

  if (!files.length) { showToast('PDF 파일을 찾을 수 없습니다'); return; }
  showToast(`PDF ${files.length}개 처리 중...`);

  const existingNames = new Set(books.map(b => b.fileName));
  let added = 0;

  for (const file of files) {
    if (existingNames.has(file.name)) continue;
    const record = {
      name:      file.name,
      fileName:  file.name,
      blob:      file,        // File extends Blob — IDB stores it natively
      createdAt: Date.now(),
    };
    const id = await idbAdd('books', record);
    books.push({ ...record, id });
    added++;
  }

  renderBookshelf();
  showToast(added > 0
    ? `${added}권의 책이 추가되었습니다!`
    : '이미 모두 추가된 파일입니다');
});

/* =============================================================
   Open Book — GSAP Animation
   ============================================================= */
async function openBook(book, bookEl) {
  // Disable click during animation
  bookEl.style.pointerEvents = 'none';

  const rect = bookEl.getBoundingClientRect();
  const gi   = books.findIndex(b => b.id === book.id);
  const bg   = PALETTES[gi >= 0 ? gi % PALETTES.length : 0];

  // Target size: near full-screen centered
  const TW = Math.min(window.innerWidth  * 0.56, 500);
  const TH = Math.min(window.innerHeight * 0.80, 680);
  const TX = (window.innerWidth  - TW) / 2;
  const TY = (window.innerHeight - TH) / 2;

  // --- Phase 1: lift book ---
  await gsap.to(bookEl, {
    y: -18, duration: 0.15, ease: 'power2.out',
  });
  bookEl.style.opacity = '0';
  gsap.set(bookEl, { y: 0 });

  // --- Set up animBook at book's original position ---
  const animBook  = document.getElementById('animBook');
  const animCover = document.getElementById('animBookCover');
  document.getElementById('animBookTitle').textContent =
    book.name.replace(/\.pdf$/i, '');

  animCover.style.background = bg;
  gsap.set(animBook, {
    display: 'block',
    x: 0, y: 0,
    left: rect.left,
    top:  rect.top,
    width:  rect.width,
    height: rect.height,
    opacity: 1,
  });
  gsap.set(animCover, { rotationY: 0, skewY: 0, transformOrigin: 'left center' });

  // --- Phase 2: fly to center and expand ---
  await gsap.to(animBook, {
    left:   TX,
    top:    TY,
    width:  TW,
    height: TH,
    duration: 0.65,
    ease: 'power3.inOut',
  });

  // --- Phase 3: flip cover open ---
  await gsap.timeline()
    .to(animCover, {
      rotationY: -90,
      skewY: -4,
      duration: 0.38,
      ease: 'power2.in',
      onStart() { animCover.style.transformPerspective = '1200px'; }
    })
    .to(animCover, {
      rotationY: -180,
      skewY: 0,
      duration: 0.38,
      ease: 'power2.out',
    });

  // --- Phase 4: fade out animBook, show workspace ---
  gsap.to(animBook, {
    opacity: 0, scale: 0.97, duration: 0.28,
    onComplete: () => {
      gsap.set(animBook, { display: 'none', scale: 1 });
    }
  });

  // Populate workspace
  currentBook = book;
  document.getElementById('wsTitle').textContent =
    book.name.replace(/\.pdf$/i, '');

  const overlay = document.getElementById('workspaceOverlay');
  overlay.style.display = 'flex';
  await gsap.fromTo(overlay, { opacity: 0 }, { opacity: 1, duration: 0.38 });

  // Load data in parallel
  loadPDF(book);
  loadMemos(book.id);
}

/* =============================================================
   Close Book
   ============================================================= */
async function closeBook() {
  const overlay = document.getElementById('workspaceOverlay');
  await gsap.to(overlay, { opacity: 0, duration: 0.32 });
  overlay.style.display = 'none';

  // Restore original book element
  if (currentBook) {
    const el = document.querySelector(`.book[data-bid="${currentBook.id}"]`);
    if (el) {
      el.style.pointerEvents = '';
      el.style.opacity = '0';
      gsap.to(el, {
        opacity: 1, y: -10, duration: 0.01,
        onComplete: () => gsap.to(el, { y: 0, duration: 0.42, ease: 'back.out(2)' })
      });
    }
  }

  // Cleanup PDF
  if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
  rendering   = false;
  pendingPage = null;
  currentBook = null;
  currentPage = 1;
  totalPages  = 1;

  const canvas = document.getElementById('pdfCanvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  canvas.style.display = 'none';

  const msg = document.getElementById('pdfMsg');
  msg.style.display  = 'flex';
  msg.textContent    = '책을 열면 PDF가 표시됩니다';

  document.getElementById('prevPageBtn').disabled     = true;
  document.getElementById('nextPageBtn').disabled     = true;
  document.getElementById('pageInfo').textContent     = '— / —';
  document.getElementById('memoTextarea').value       = '';
  document.getElementById('memoList').innerHTML       = '';
  document.getElementById('memoPageTag').textContent  = '[p.1] 현재 페이지';
  closeSummaryBox();
}

/* =============================================================
   PDF Loading & Rendering
   ============================================================= */
async function loadPDF(book) {
  const msg    = document.getElementById('pdfMsg');
  const canvas = document.getElementById('pdfCanvas');

  msg.textContent   = 'PDF 불러오는 중...';
  msg.style.display = 'flex';
  canvas.style.display = 'none';

  try {
    // Always re-fetch from DB so we get a fresh Blob handle
    const record = await idbGet('books', book.id);
    const buffer = await record.blob.arrayBuffer();

    pdfDoc     = await pdfjsLib.getDocument({
      data: buffer,
      // 한글(CJK) PDF는 유니코드 텍스트 추출에 CMap이 필요함 (렌더링은 영향 없음)
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
      cMapPacked: true,
    }).promise;
    totalPages = pdfDoc.numPages;
    currentPage = 1;

    msg.style.display    = 'none';
    canvas.style.display = 'block';
    await renderPage(currentPage);
  } catch (err) {
    msg.textContent = `PDF 로드 실패: ${err.message}`;
    console.error(err);
  }
}

async function renderPage(num) {
  if (!pdfDoc) return;
  if (rendering) { pendingPage = num; return; }

  rendering = true;
  const canvas = document.getElementById('pdfCanvas');

  try {
    const page = await pdfDoc.getPage(num);
    const wrap = document.getElementById('pdfCanvasWrap');
    const availW = wrap.clientWidth - 48;

    const baseVP = page.getViewport({ scale: 1 });
    const scale  = Math.min(availW / baseVP.width, 2.2);
    const vp     = page.getViewport({ scale });

    canvas.width  = vp.width;
    canvas.height = vp.height;

    await page.render({
      canvasContext: canvas.getContext('2d'),
      viewport: vp,
    }).promise;

    currentPage = num;
    syncControls();
  } catch (err) {
    console.error('Render error:', err);
  } finally {
    rendering = false;
    if (pendingPage !== null) {
      const p = pendingPage;
      pendingPage = null;
      renderPage(p);
    }
  }
}

function syncControls() {
  document.getElementById('pageInfo').textContent     = `${currentPage} / ${totalPages}`;
  document.getElementById('prevPageBtn').disabled     = currentPage <= 1;
  document.getElementById('nextPageBtn').disabled     = currentPage >= totalPages;
  document.getElementById('memoPageTag').textContent  = `[p.${currentPage}] 현재 페이지`;
}

function changePage(delta) {
  const next = currentPage + delta;
  if (next < 1 || next > totalPages) return;
  renderPage(next);
}

document.getElementById('prevPageBtn').addEventListener('click', () => changePage(-1));
document.getElementById('nextPageBtn').addEventListener('click', () => changePage(1));

/* =============================================================
   Memos
   ============================================================= */
async function loadMemos(bookId) {
  const memos = await idbGetByIndex('memos', 'byBook', bookId);
  memos.sort((a, b) => b.createdAt - a.createdAt);
  renderMemos(memos);
}

function renderMemos(memos) {
  const list = document.getElementById('memoList');
  if (!memos.length) {
    list.innerHTML = `<div class="memo-empty-msg">
      아직 메모가 없습니다<br><br>
      📝 왼쪽 PDF를 읽으며<br>생각을 기록해보세요
    </div>`;
    return;
  }
  list.innerHTML = memos.map(m => `
    <div class="memo-card" data-mid="${m.id}" data-page="${m.page}" title="클릭하면 p.${m.page} 페이지로 이동">
      <div class="memo-card-tag"><span class="memo-card-jump">→ 이동</span>[p.${m.page}] &nbsp;${fmtDate(m.createdAt)}</div>
      <div class="memo-card-text">${escHtml(m.content)}</div>
      <button class="memo-card-del" onclick="deleteMemo(${m.id})" title="삭제">✕</button>
    </div>
  `).join('');
}

async function saveMemo() {
  const ta      = document.getElementById('memoTextarea');
  const content = ta.value.trim();
  if (!content || !currentBook) return;

  await idbAdd('memos', {
    bookId:    currentBook.id,
    page:      currentPage,
    content,
    createdAt: Date.now(),
  });

  ta.value = '';
  showToast('메모가 저장되었습니다');
  loadMemos(currentBook.id);
}

async function deleteMemo(id) {
  await idbDelete('memos', id);
  if (currentBook) loadMemos(currentBook.id);
  showToast('메모가 삭제되었습니다');
}

document.getElementById('memoSaveBtn').addEventListener('click', saveMemo);
document.getElementById('wsCloseBtn').addEventListener('click', closeBook);

document.getElementById('memoTextarea').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    saveMemo();
  }
});

/* Click a memo card → jump to the PDF page where it was written */
function goToMemoPage(page) {
  if (!pdfDoc || !page) return;
  const target = Math.min(Math.max(page, 1), totalPages);
  if (target !== currentPage) {
    renderPage(target);
    const wrap = document.getElementById('pdfCanvasWrap');
    if (wrap) wrap.scrollTop = 0;
    showToast(`p.${target} 페이지로 이동`);
  } else {
    showToast(`현재 p.${target} 페이지입니다`);
  }
}

document.getElementById('memoList').addEventListener('click', e => {
  if (e.target.closest('.memo-card-del')) return;   // delete is handled separately
  const card = e.target.closest('.memo-card');
  if (!card) return;
  goToMemoPage(parseInt(card.dataset.page, 10));
});

/* =============================================================
   AI Summary (server proxy → /api/summarize, Groq)
   ============================================================= */
let lastSummary = null;   // { page, text } of the most recent successful summary

// Extract selectable text from a given PDF page via PDF.js
async function extractPageText(pageNum) {
  const page = await pdfDoc.getPage(pageNum);
  const tc   = await page.getTextContent();
  return tc.items.map(it => it.str).join(' ').replace(/\s+/g, ' ').trim();
}

// Gather text across the whole document (capped) for the "전체" summary
const SUMMARY_TEXT_CAP = 12000;
async function gatherDocText() {
  const parts = [];
  let total = 0;
  for (let p = 1; p <= totalPages; p++) {
    const t = await extractPageText(p);
    if (t) { parts.push(t); total += t.length + 1; }
    if (total >= SUMMARY_TEXT_CAP) break;
  }
  return parts.join('\n').slice(0, SUMMARY_TEXT_CAP).trim();
}

// Call the server summary endpoint; throw coded errors for friendly messages
async function requestSummary(content, title) {
  let resp;
  try {
    resp = await fetch('/api/summarize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, fileTitle: title, fileExt: 'pdf' })
    });
  } catch (e) {
    throw new Error('NETWORK');
  }
  let data = null;
  try { data = await resp.json(); } catch (e) { data = null; }
  if (!resp.ok) {
    if (resp.status === 503) throw new Error('NOKEY');
    if (resp.status === 404 || resp.status === 405) throw new Error('NOSERVER');
    throw new Error((data && data.error) ? data.error : ('HTTP ' + resp.status));
  }
  if (!data || !data.result) throw new Error('서버 응답이 비어 있습니다');
  return data.result;
}

const SUMMARY_ERRORS = {
  NOTEXT:   '이 PDF에서 추출할 수 있는 텍스트가 거의 없습니다.\n스캔본이거나 텍스트가 이미지로 들어간 PDF는 요약할 수 없어요.',
  NOTEXT_PAGE: '이 페이지에는 추출할 텍스트가 거의 없습니다.\n표지·그림 위주 페이지일 수 있어요. [📚 전체] 요약을 사용해보세요.',
  NETWORK:  'AI 요약 서버에 연결할 수 없습니다.\nserver.js 실행 후( npm start ) http://localhost:3000 에서 열어주세요.',
  NOSERVER: 'AI 요약 API(/api/summarize)를 찾을 수 없습니다.\n정적 서버 대신 server.js로 실행해야 합니다 ( npm start, 포트 3000 ).',
  NOKEY:    '서버에 GROQ_API_KEY가 설정되지 않았습니다.\n.env 에 키를 넣고 server.js를 다시 시작해주세요.'
};

async function doAISummary(mode) {   // mode: 'page' | 'doc'
  if (!pdfDoc || !currentBook) return;

  const pageBtn  = document.getElementById('aiSummaryPageBtn');
  const docBtn   = document.getElementById('aiSummaryDocBtn');
  const box      = document.getElementById('aiSummaryBox');
  const badge    = document.getElementById('aiSummaryBadge');
  const contentEl= document.getElementById('aiSummaryContent');
  const saveBtn  = document.getElementById('aiSummarySaveBtn');
  const page     = currentPage;
  const clicked  = mode === 'doc' ? docBtn : pageBtn;
  const original = clicked.textContent;

  pageBtn.disabled = true;
  docBtn.disabled  = true;
  clicked.textContent = '⏳…';
  box.style.display = 'block';
  box.classList.remove('error');
  saveBtn.style.display = 'none';
  badge.textContent = mode === 'doc' ? '🤖 문서 전체 요약 중' : `🤖 p.${page} 요약 중`;
  contentEl.innerHTML = `<span class="ai-sum-loading">AI가 ${mode === 'doc' ? '문서 전체' : ('p.' + page + ' 페이지')}를 분석하고 있습니다…</span>`;

  try {
    let text;
    if (mode === 'doc') {
      text = await gatherDocText();
      if (text.length < 20) throw new Error('NOTEXT');
    } else {
      text = await extractPageText(page);
      if (text.length < 20) throw new Error('NOTEXT_PAGE');
    }

    const result = await requestSummary(text, currentBook.name.replace(/\.pdf$/i, ''));
    lastSummary = { page, text: result, scope: mode };
    badge.textContent     = mode === 'doc' ? '🤖 문서 전체 AI 요약' : `🤖 p.${page} AI 요약`;
    contentEl.textContent = result;
    saveBtn.style.display = '';
  } catch (err) {
    box.classList.add('error');
    badge.textContent     = '⚠️ 요약 실패';
    saveBtn.style.display  = 'none';
    lastSummary = null;
    contentEl.textContent = SUMMARY_ERRORS[err.message] || ('오류: ' + err.message);
  } finally {
    pageBtn.disabled = false;
    docBtn.disabled  = false;
    clicked.textContent = original;
  }
}

async function saveSummaryAsMemo() {
  if (!lastSummary || !currentBook) return;
  await idbAdd('memos', {
    bookId:    currentBook.id,
    page:      lastSummary.page,
    content:   (lastSummary.scope === 'doc' ? '🤖 AI 요약 (문서 전체)\n' : '🤖 AI 요약\n') + lastSummary.text,
    createdAt: Date.now()
  });
  showToast('AI 요약을 메모로 저장했습니다');
  loadMemos(currentBook.id);
}

function closeSummaryBox() {
  const box = document.getElementById('aiSummaryBox');
  box.style.display = 'none';
  box.classList.remove('error');
  document.getElementById('aiSummaryContent').textContent = '';
  document.getElementById('aiSummarySaveBtn').style.display = 'none';
  lastSummary = null;
}

document.getElementById('aiSummaryPageBtn').addEventListener('click', () => doAISummary('page'));
document.getElementById('aiSummaryDocBtn').addEventListener('click', () => doAISummary('doc'));
document.getElementById('aiSummarySaveBtn').addEventListener('click', saveSummaryAsMemo);
document.getElementById('aiSummaryCloseBtn').addEventListener('click', closeSummaryBox);

/* =============================================================
   Keyboard shortcuts
   ============================================================= */
document.addEventListener('keydown', e => {
  const ws = document.getElementById('workspaceOverlay');
  if (ws.style.display === 'none' || !ws.style.display) return;
  if (e.key === 'Escape') { closeBook(); return; }
  if (document.activeElement === document.getElementById('memoTextarea')) return;
  if (e.key === 'ArrowLeft')  changePage(-1);
  if (e.key === 'ArrowRight') changePage(1);
});

/* =============================================================
   Utilities
   ============================================================= */
function escHtml(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} `
       + `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* =============================================================
   Boot
   ============================================================= */
(async () => {
  await openDB();
  const all = await idbGetAll('books');
  books = all.sort((a, b) => a.createdAt - b.createdAt);
  renderBookshelf();
})();
</script>
