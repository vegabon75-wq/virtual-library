<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 가상 서재</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#d4941f;--amber-light:#f0c060;
  --cream:#f5ead5;--paper:#fdf8ee;
  --text-dark:#1a0f07;--text-warm:#5c3a1e;
}
html,body{min-height:100vh;overflow-x:hidden}
body{background:#0a0603;color:var(--cream);font-family:'Noto Serif KR','Crimson Text',Georgia,serif}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 100% 50% at 50% 0%,rgba(139,94,60,.12) 0%,transparent 60%),radial-gradient(ellipse 30% 60% at 10% 100%,rgba(60,30,10,.4) 0%,transparent 70%),radial-gradient(ellipse 30% 60% at 90% 100%,rgba(60,30,10,.4) 0%,transparent 70%);pointer-events:none;z-index:0}

/* WELCOME */
#welcome{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:radial-gradient(ellipse 80% 80% at 50% 50%,#150a03,#060300);transition:opacity .8s,visibility .8s}
#welcome.hidden{opacity:0;visibility:hidden;pointer-events:none}
.welcome-candle{font-size:3.5rem;margin-bottom:1.5rem;animation:flicker 2.4s ease-in-out infinite}
@keyframes flicker{0%,100%{transform:scale(1)}33%{transform:scale(.97) rotate(-1deg)}66%{transform:scale(1.02) rotate(1deg)}}
.welcome-title{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,4rem);color:var(--amber-light);text-align:center;letter-spacing:.03em;margin-bottom:.6rem}
.welcome-sub{font-family:'Crimson Text',serif;font-size:1.15rem;color:rgba(245,234,213,.55);text-align:center;font-style:italic;margin-bottom:3rem}
.btn-primary{background:linear-gradient(160deg,#7a4520,#5c3317,#3d1f0c);border:1px solid var(--amber);color:var(--amber-light);font-family:'Playfair Display',serif;font-size:1.05rem;padding:.95rem 2.8rem;cursor:pointer;border-radius:3px;letter-spacing:.08em;transition:all .3s}
.btn-primary:hover{border-color:var(--amber-light);transform:translateY(-2px)}

/* LIBRARY */
#library{position:relative;z-index:1;padding:2rem 2.5rem 4rem;max-width:1400px;margin:0 auto;display:none}
.lib-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2.5rem;padding-bottom:1rem;border-bottom:1px solid rgba(139,94,60,.25)}
.lib-title{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--amber-light)}
.lib-folder{font-size:.82rem;color:rgba(245,234,213,.4);font-style:italic;margin-top:3px}
.btn-sm{background:transparent;border:1px solid rgba(139,94,60,.4);color:rgba(245,234,213,.6);padding:.45rem 1.1rem;cursor:pointer;border-radius:3px;font-size:.82rem;font-family:'Noto Serif KR',serif;transition:all .2s}
.btn-sm:hover{border-color:var(--amber);color:var(--amber-light)}

/* SHELF */
.shelf-unit{position:relative}
.books-row{display:flex;align-items:flex-end;flex-wrap:wrap;padding:2rem 1.5rem 0;min-height:310px;gap:4px}
.shelf-board{height:20px;background:linear-gradient(180deg,#9a6b40,#7a4a22 30%,#5c3317 70%,#3d1f0c);border-radius:3px 3px 1px 1px;box-shadow:0 5px 15px rgba(0,0,0,.7),inset 0 2px 4px rgba(255,255,255,.08)}

/* BOOK SPINE */
.book-wrap{position:relative;cursor:pointer;animation:bookIn .5s cubic-bezier(.34,1.56,.64,1) both;opacity:0}
@keyframes bookIn{from{opacity:0;transform:translateY(40px) scale(.85)}to{opacity:1;transform:none}}
.book-wrap:hover .book-spine{transform:translateY(-14px) scale(1.04);filter:brightness(1.2)}
.book-spine{position:relative;display:flex;align-items:center;justify-content:center;border-radius:2px 1px 1px 2px;overflow:hidden;transition:transform .35s cubic-bezier(.34,1.56,.64,1),filter .2s;transform-origin:bottom center;box-shadow:3px 0 6px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.06)}
.book-spine::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%;background:linear-gradient(90deg,rgba(255,255,255,.18),transparent)}
.book-spine::after{content:'';position:absolute;right:0;top:0;width:5px;height:100%;background:linear-gradient(90deg,transparent,rgba(0,0,0,.45))}
.spine-edge{position:absolute;left:10%;right:10%;height:1px;background:rgba(255,255,255,.12)}
.spine-edge.top{top:6px}.spine-edge.bottom{bottom:6px}
.spine-title{writing-mode:vertical-lr;text-orientation:mixed;font-size:12px;font-family:'Noto Serif KR',serif;color:rgba(255,255,255,.88);font-weight:400;letter-spacing:.06em;text-shadow:0 1px 4px rgba(0,0,0,.9);max-height:80%;overflow:hidden;padding:6px 0;line-height:1.1;z-index:1;word-break:break-all}
.book-tooltip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:rgba(20,10,3,.95);border:1px solid rgba(139,94,60,.4);color:var(--cream);font-size:.7rem;padding:4px 9px;border-radius:3px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;z-index:10;max-width:180px;overflow:hidden;text-overflow:ellipsis;font-family:'Noto Serif KR',serif}
.book-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:rgba(20,10,3,.95)}
.book-wrap:hover .book-tooltip{opacity:1}

/* SPINE PROGRESS */
.spine-progress{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(0,0,0,.25);border-radius:0 0 2px 2px;overflow:hidden}
.spine-progress-fill{height:100%;width:0%;background:linear-gradient(90deg,rgba(212,148,31,.7),rgba(240,192,96,.95));transition:width .4s ease}
.spine-pct-badge{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(10,5,2,.92);border:1px solid rgba(212,148,31,.45);color:var(--amber-light);font-size:.62rem;padding:2px 7px;border-radius:3px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;z-index:11;font-family:'Noto Serif KR',serif}
.spine-pct-badge::after{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-bottom-color:rgba(10,5,2,.92)}
.book-wrap:hover .spine-pct-badge{opacity:1}

/* MODAL */
#book-modal{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .5s,visibility .5s}
#book-modal.open{opacity:1;visibility:visible}
.modal-bg{position:absolute;inset:0;background:rgba(4,2,1,.92);backdrop-filter:blur(6px);cursor:pointer}
.modal-light{position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:200px;background:radial-gradient(ellipse at 50% 0%,rgba(255,200,80,.1),transparent 70%);pointer-events:none}
#btn-close{position:fixed;top:1.2rem;right:1.2rem;z-index:600;background:rgba(20,10,3,.85);border:1px solid rgba(139,94,60,.45);color:rgba(245,234,213,.7);width:38px;height:38px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .5s .6s,visibility .5s .6s,transform .3s}
#book-modal.open #btn-close{opacity:1;visibility:visible}
#btn-close:hover{transform:rotate(90deg)}

/* RESIZER */
.book-resizer{position:relative;z-index:10;display:inline-flex;align-items:center;justify-content:center;user-select:none}
.rz{position:absolute;z-index:20}
.rz-corner{width:20px;height:20px;border:2px solid rgba(212,148,31,.55);border-radius:3px;transition:background .2s}
.rz-corner:hover,.rz-corner.active{background:rgba(212,148,31,.2);border-color:var(--amber-light)}
.rz-nw{top:-10px;left:-10px;cursor:nw-resize;border-right:none;border-bottom:none}
.rz-ne{top:-10px;right:-10px;cursor:ne-resize;border-left:none;border-bottom:none}
.rz-sw{bottom:-10px;left:-10px;cursor:sw-resize;border-right:none;border-top:none}
.rz-se{bottom:-10px;right:-10px;cursor:se-resize;border-left:none;border-top:none}
.rz-edge{transition:background .2s}
.rz-edge:hover,.rz-edge.active{background:rgba(212,148,31,.25)}
.rz-n,.rz-s{left:14px;right:14px;height:10px;cursor:ns-resize}
.rz-w,.rz-e{top:14px;bottom:14px;width:10px;cursor:ew-resize}
.rz-n{top:-5px}.rz-s{bottom:-5px}.rz-w{left:-5px}.rz-e{right:-5px}
.rz-hint{position:absolute;bottom:calc(100% + 14px);left:50%;transform:translateX(-50%);background:rgba(10,6,3,.9);border:1px solid rgba(212,148,31,.4);color:var(--amber-light);font-size:.72rem;padding:3px 10px;border-radius:3px;white-space:nowrap;pointer-events:none;opacity:0;font-family:'Noto Serif KR',serif}
.book-resizer.resizing .rz-hint{opacity:1}

/* BOOK SCENE */
.book-scene{position:relative;perspective:2000px;width:min(96vw,1100px);height:min(84vh,740px)}
.open-book{width:100%;height:100%;transform-style:preserve-3d;transform:translateY(30px) scale(.92);transition:transform .8s cubic-bezier(.34,1.2,.64,1);position:relative;perspective:1200px}
#book-modal.open .open-book{transform:none}
.book-body-base{position:absolute;inset:0;border-radius:5px 14px 14px 5px;transform:translateZ(-10px);box-shadow:-16px 24px 70px rgba(0,0,0,.85)}

/* COVER */
.cover-left{position:absolute;left:0;top:0;width:50%;height:100%;transform-origin:right center;transform-style:preserve-3d;transform:rotateY(0deg);transition:transform 1.5s cubic-bezier(.42,0,.1,1);border-radius:5px 0 0 5px;z-index:5}
#book-modal.open .cover-left{transform:rotateY(-168deg)}
.cover-front{position:absolute;inset:0;backface-visibility:hidden;border-radius:5px 0 0 5px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;position:relative}
.cover-front::before{content:'';position:absolute;inset:12px;border:1px solid rgba(255,255,255,.12);border-radius:2px;pointer-events:none}
.cover-spine-strip{position:absolute;right:0;top:0;bottom:0;width:8px;background:rgba(0,0,0,.35)}
.cover-emblem{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:1rem;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.25)}
.cover-title{font-family:'Playfair Display',serif;font-size:clamp(.85rem,2vw,1.3rem);color:var(--amber-light);text-align:center;word-break:break-word;line-height:1.4}
.cover-ext{font-size:.7rem;color:rgba(212,148,31,.65);margin-top:.5rem;letter-spacing:.18em;text-transform:uppercase}
.cover-back{position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);border-radius:5px 0 0 5px;background:linear-gradient(135deg,#2a1408,#1a0c05);display:flex;align-items:center;justify-content:center}
.cover-back-pattern{width:80%;height:80%;opacity:.08;background:repeating-linear-gradient(45deg,rgba(255,255,255,.5) 0,rgba(255,255,255,.5) 1px,transparent 1px,transparent 12px)}

/* PAGES */
.pages-spread{position:absolute;inset:0;display:flex;border-radius:5px 14px 14px 5px;overflow:hidden;background:var(--paper)}
.pages-spread::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:24px;transform:translateX(-50%);background:linear-gradient(90deg,rgba(0,0,0,.12),rgba(0,0,0,.04) 30%,rgba(0,0,0,.04) 70%,rgba(0,0,0,.12));pointer-events:none;z-index:3}
.page{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
.page-left{border-radius:5px 0 0 5px;border-right:1px solid rgba(0,0,0,.06);opacity:0;transition:opacity .6s .9s}
#book-modal.open .page-left{opacity:1}
.page-right{border-radius:0 14px 14px 0}

/* PROGRESS */
.prog-track{height:4px;flex-shrink:0;background:rgba(139,94,60,.15);width:100%}
.prog-fill{height:4px;width:0%;background:linear-gradient(90deg,#8b5e3c,var(--amber),#f0c060);transition:width .2s ease}

/* PAGE LAYOUT */
.page-header{display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:.8rem 1.4rem .55rem;border-bottom:1px solid rgba(0,0,0,.07);flex-shrink:0}
.page-chapter{font-family:'Playfair Display',serif;font-size:.78rem;color:var(--text-warm);font-style:italic;opacity:.7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-pct{font-size:.68rem;color:rgba(139,94,60,.6);font-style:italic;white-space:nowrap;letter-spacing:.04em;font-family:'Crimson Text',serif;flex-shrink:0}
.page-body{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:1.2rem 1.6rem;font-family:'Crimson Text',Georgia,serif;font-size:1.05rem;line-height:1.9;color:var(--text-dark)}
.page-body::-webkit-scrollbar{width:3px}
.page-body::-webkit-scrollbar-thumb{background:rgba(92,58,30,.25);border-radius:2px}
.page-body pre{font-family:'Courier New',monospace;font-size:.8rem;white-space:pre-wrap;word-break:break-all;color:#3a2010;line-height:1.6;background:rgba(0,0,0,.03);padding:.5rem;border-radius:2px}
.page-body h1{font-family:'Playfair Display',serif;font-size:1.25rem;color:#3a2010;margin:.8rem 0 .4rem}
.page-body h2{font-family:'Playfair Display',serif;font-size:1.05rem;color:#5c3a1e;margin:.7rem 0 .35rem}
.page-body li{margin:.25rem 0 .25rem 1.2rem}
.page-body code{background:rgba(92,58,30,.1);padding:1px 5px;border-radius:2px;font-family:monospace;font-size:.85em;color:#5c3a1e}
.page-footer{padding:.45rem 1.4rem;border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.page-num{font-family:'Crimson Text',serif;font-size:.72rem;color:rgba(92,58,30,.4);font-style:italic}

/* IMAGE / PDF */
.img-viewer{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:1rem}
.img-viewer img{max-width:100%;max-height:100%;object-fit:contain;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.pdf-wrap{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;background:#e8e0d0;display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 8px}
.pdf-wrap::-webkit-scrollbar{width:4px}
.pdf-wrap::-webkit-scrollbar-thumb{background:rgba(92,58,30,.3);border-radius:2px}
.pdf-wrap canvas{display:block;box-shadow:0 2px 10px rgba(0,0,0,.2);width:100%;background:#fff}
.pdf-loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-warm);font-style:italic;font-size:.9rem;font-family:'Crimson Text',serif}

/* MEMO */
.memo-header{display:flex;align-items:center;justify-content:space-between}
.memo-status{font-size:.7rem;color:#a07850;font-style:italic;opacity:0;transition:opacity .4s}
.memo-status.show{opacity:1}
.memo-area{flex:1;min-height:0;position:relative;overflow:hidden;background:repeating-linear-gradient(transparent,transparent 35px,rgba(180,140,100,.18) 35px,rgba(180,140,100,.18) 36px)}
.memo-area::before{content:'';position:absolute;left:52px;top:0;bottom:0;width:1px;background:rgba(200,100,100,.2);pointer-events:none;z-index:1}
.memo-ta{width:100%;height:100%;border:none;outline:none;resize:none;background:transparent;font-family:'Noto Serif KR','Crimson Text',Georgia,serif;font-size:1rem;line-height:36px;color:var(--text-dark);padding:8px 1.4rem 1rem 60px;caret-color:#8b5e3c;display:block}
.memo-ta::placeholder{color:rgba(92,58,30,.3);font-style:italic}
.memo-ta::-webkit-scrollbar{width:3px}
.memo-ta::-webkit-scrollbar-thumb{background:rgba(92,58,30,.2);border-radius:2px}
.memo-footer{display:flex;align-items:center;justify-content:space-between;padding:.4rem 1rem;border-top:1px solid rgba(0,0,0,.07);flex-shrink:0}
.mbtn{background:none;border:1px solid rgba(139,94,60,.3);color:var(--text-warm);font-family:'Noto Serif KR',serif;font-size:.72rem;padding:3px 10px;border-radius:3px;cursor:pointer;transition:all .2s}
.mbtn:hover{background:rgba(139,94,60,.1)}
.mbtn.del{border-color:rgba(180,80,80,.25);color:rgba(150,60,60,.7)}
.mbtn.del:hover{background:rgba(180,80,80,.08)}
.mbtn.ai{border-color:rgba(100,140,212,.4);color:rgba(100,140,220,.85)}
.mbtn.ai:hover{background:rgba(100,140,212,.1)}
.mbtn.ai:disabled{opacity:.4;cursor:not-allowed}


/* AI 요약 결과 스타일 (Summary Result) */
.ai-summary-result{background:rgba(100,140,212,.07);border:1px solid rgba(100,140,212,.22);border-radius:8px;padding:.9rem 1.1rem;margin-top:.5rem;font-family:'Noto Serif KR',serif;font-size:.87rem;color:var(--text-dark);line-height:1.85}
.ai-summary-result .ai-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;color:rgba(100,140,212,.85);border:1px solid rgba(100,140,212,.3);border-radius:4px;padding:2px 8px;margin-bottom:.55rem;font-family:'Crimson Text',serif;font-style:italic;letter-spacing:.04em}
.ai-summary-result p{margin:.35rem 0}
.ai-summary-result ul{padding-left:1.1rem;margin:.3rem 0}
.ai-summary-result li{margin:.2rem 0}

/* 타이핑 커서 (Typing Cursor) */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.typing-cursor{display:inline-block;width:2px;height:1em;background:rgba(100,140,212,.8);vertical-align:text-bottom;animation:blink .8s ease infinite;margin-left:1px}

/* AMBIENT */
#ambient-panel{position:fixed;bottom:1.8rem;right:1.8rem;z-index:300;display:flex;flex-direction:column;align-items:flex-end;gap:.6rem}
#amb-toggle{width:48px;height:48px;border-radius:50%;background:rgba(20,10,3,.88);border:1px solid rgba(212,148,31,.5);color:var(--amber-light);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .25s;backdrop-filter:blur(8px)}
#amb-toggle:hover{transform:scale(1.08)}
#amb-toggle.playing{border-color:var(--amber);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(212,148,31,.25),0 4px 20px rgba(0,0,0,.5)}50%{box-shadow:0 0 0 6px rgba(212,148,31,.12),0 4px 20px rgba(0,0,0,.5)}}
#amb-menu{background:rgba(14,8,3,.95);border:1px solid rgba(139,94,60,.4);border-radius:10px;padding:1rem;width:220px;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.7);display:none}
#amb-menu.open{display:block;animation:menuIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes menuIn{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
.amb-title{font-family:'Playfair Display',serif;font-size:.82rem;color:rgba(240,192,96,.7);letter-spacing:.06em;margin-bottom:.75rem;text-align:center}
.amb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.8rem}
.amb-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,.04);border:1px solid rgba(139,94,60,.25);border-radius:7px;padding:.5rem .3rem;cursor:pointer;transition:all .2s;color:var(--cream)}
.amb-btn:hover{background:rgba(139,94,60,.2);border-color:rgba(212,148,31,.5)}
.amb-btn.on{background:rgba(139,94,60,.35);border-color:var(--amber)}
.amb-emoji{font-size:1.3rem;line-height:1}
.amb-lbl{font-size:.62rem;color:rgba(245,234,213,.6);letter-spacing:.04em;font-family:'Noto Serif KR',serif}
.amb-btn.on .amb-lbl{color:var(--amber-light)}
.amb-vol-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem}
.amb-vol-lbl{font-size:.85rem;color:rgba(245,234,213,.4)}
#amb-vol{flex:1;height:3px;accent-color:var(--amber)}
.amb-stop{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(200,80,80,.3);color:rgba(220,120,120,.7);font-family:'Noto Serif KR',serif;font-size:.75rem;padding:.4rem;border-radius:5px;cursor:pointer;transition:all .2s}
.amb-stop:hover{background:rgba(200,80,80,.12)}

/* MISC */
.loading{display:flex;align-items:center;gap:1rem;color:var(--amber-light);font-style:italic;padding:3rem 1rem}
.dot::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
.empty{text-align:center;padding:4rem 2rem;color:rgba(245,234,213,.35);font-style:italic;line-height:2}

/* ANIMATION */
.book-fly-clone{position:fixed;z-index:490;pointer-events:none;border-radius:2px 1px 1px 2px;will-change:transform,opacity,filter;left:0;top:0}
.book-fly-clone::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%;background:linear-gradient(90deg,rgba(255,255,255,.2),transparent)}
.book-fly-clone::after{content:'';position:absolute;right:0;top:0;width:5px;height:100%;background:linear-gradient(90deg,transparent,rgba(0,0,0,.45))}

<script>
'use strict';

// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
var COLORS = ['#7a2828','#224a3f','#2a3f6e','#4a2e12','#4a2060','#163828','#6e2e1e','#1e3858','#382858','#581e3a','#1e4a28','#4a3810','#2a4a20','#582828','#184050'];
var ICONS  = {txt:'📝',md:'📋',js:'⚙️',json:'🗂️',css:'🎨',html:'🌐',py:'🐍',java:'☕',ts:'📘',jsx:'⚛️',tsx:'⚛️',xml:'📄',csv:'📊',log:'📃',pdf:'📕',png:'🖼️',jpg:'🖼️',jpeg:'🖼️',gif:'🎞️',webp:'🖼️',svg:'✏️'};
var EXT    = ['txt','md','text','js','json','css','html','py','java','ts','jsx','tsx','xml','csv','log','pdf','png','jpg','jpeg','gif','webp','svg'];
var MIME   = {txt:'text/plain',md:'text/markdown',js:'text/javascript',json:'application/json',css:'text/css',html:'text/html',py:'text/x-python',pdf:'application/pdf',png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',gif:'image/gif',webp:'image/webp',svg:'image/svg+xml'};

// ═══════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════
function lsGet(k, def) { try { var v = localStorage.getItem(k); return v === null ? (def || '') : v; } catch(e) { return def || ''; } }
function lsSet(k, v)   { try { localStorage.setItem(k, String(v)); } catch(e) {} }

// IndexedDB for folder handle
var IDB_NAME = 'vslib', IDB_STORE = 'handles', IDB_KEY = 'lastDir';
function openIDB() {
  return new Promise(function(res, rej) {
    var r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = function(e) { e.target.result.createObjectStore(IDB_STORE); };
    r.onsuccess = function(e) { res(e.target.result); };
    r.onerror   = function(e) { rej(e); };
  });
}
function saveLastDir(handle) {
  return openIDB().then(function(db) {
    db.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).put(handle, IDB_KEY);
  }).catch(function(){});
}
function loadLastDir() {
  return openIDB().then(function(db) {
    return new Promise(function(res) {
      var r = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(IDB_KEY);
      r.onsuccess = function(e) { res(e.target.result || null); };
      r.onerror   = function()  { res(null); };
    });
  }).catch(function() { return null; });
}
async function tryRestoreLastDir() {
  var h = await loadLastDir();
  if (!h) return null;
  try {
    var p = await h.queryPermission({mode:'read'});
    if (p !== 'granted') p = await h.requestPermission({mode:'read'});
    return p === 'granted' ? h : null;
  } catch(e) { return null; }
}

// ═══════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════
var P = {name:'', el:null, ac:null};

function pKey(n) { return 'pg_' + n; }
function setProgUI(p) {
  document.getElementById('prog-fill').style.width = p + '%';
  document.getElementById('prog-pct').textContent  = p + '%';
}
function spineUpdate(name, p) {
  var w = document.querySelector('.book-wrap[data-f="' + CSS.escape(name) + '"]');
  if (!w) return;
  var f = w.querySelector('.spine-progress-fill');
  var b = w.querySelector('.spine-pct-badge');
  if (f) f.style.width  = p + '%';
  if (b) b.textContent  = p + '%';
}
function calcP(el) {
  var max = el.scrollHeight - el.clientHeight;
  return max > 1 ? Math.round(el.scrollTop / max * 100) : 0;
}
function onScroll() {
  if (!P.el) return;
  var p = calcP(P.el);
  setProgUI(p);
  lsSet(pKey(P.name),       P.el.scrollTop);
  lsSet(pKey(P.name) + 'p', p);
  spineUpdate(P.name, p);
}
function detachProg() {
  if (P.ac) { P.ac.abort(); P.ac = null; }
  P.el = null; P.name = '';
}
function attachProg(el, name) {
  detachProg();
  P.name = name; P.el = el; P.ac = new AbortController();
  el.addEventListener('scroll', onScroll, {signal: P.ac.signal, passive: true});
  var top = parseFloat(lsGet(pKey(name), '0'));
  if (top > 0) el.scrollTop = top;
  setProgUI(parseInt(lsGet(pKey(name) + 'p', '0')));
}

// ═══════════════════════════════════════
// MEMO
// ═══════════════════════════════════════
var memoName = '', memoTm = null;

function loadMemo(n) {
  memoName = n;
  document.getElementById('memo-ta').value = lsGet('mo_' + n, '');
  document.getElementById('memo-st').classList.remove('show');
}
function saveMemo() {
  if (!memoName) return;
  lsSet('mo_' + memoName, document.getElementById('memo-ta').value);
  showMemoSt('✓ 저장됨');
}
function delMemo() {
  if (!memoName || !confirm('메모를 지울까요?')) return;
  document.getElementById('memo-ta').value = '';
  lsSet('mo_' + memoName, '');
  showMemoSt('지워졌습니다');
}
function showMemoSt(msg) {
  var el = document.getElementById('memo-st');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(memoTm);
  memoTm = setTimeout(function() { el.classList.remove('show'); }, 2000);
}

document.getElementById('memo-ta').addEventListener('input', function() {
  clearTimeout(memoTm); memoTm = setTimeout(saveMemo, 1500);
});
document.getElementById('memo-save').addEventListener('click', saveMemo);
document.getElementById('memo-del').addEventListener('click', delMemo);
// ═══════════════════════════════════════
// AI 요약 기능 — 서버 프록시 방식 (AI Summary via Server Proxy)
// API 키는 서버 .env 에만 존재하며 클라이언트에 노출되지 않음
// ═══════════════════════════════════════

// 현재 열린 파일의 텍스트 콘텐츠를 추출하는 함수 (Extract current file text content)
function extractCurrentText() {
  var body = document.getElementById('pg-body');
  if (!body) return '';

  // PDF 뷰어의 경우 캔버스에서 텍스트를 직접 추출하기 어려우므로 파일명 기반 안내 반환
  var pdfWrap = body.querySelector('#pdf-wrap');
  if (pdfWrap) {
    var title = document.getElementById('pg-title');
    return '[PDF 문서: ' + (title ? title.textContent : '알 수 없음') + ']\n\n이 문서는 PDF 형식으로, 시각적으로 렌더링된 상태입니다. 표지와 제목 정보를 바탕으로 요약을 요청합니다.';
  }

  // 이미지 뷰어인 경우 (Image viewer)
  var imgViewer = body.querySelector('.img-viewer');
  if (imgViewer) {
    var title2 = document.getElementById('pg-title');
    return '[이미지 파일: ' + (title2 ? title2.textContent : '알 수 없음') + ']\n\n이 파일은 이미지입니다. 요약할 텍스트 내용이 없습니다.';
  }

  // 일반 텍스트/코드/마크다운 파일 (Plain text, code, markdown)
  var text = body.innerText || body.textContent || '';
  return text.trim();
}

// 서버 프록시를 통해 Gemini 요약 요청 (Request summary via server proxy)
async function callSummaryAPI(content) {
  var titleEl = document.getElementById('pg-title');
  var extEl   = document.getElementById('c-ext');

  // 서버의 /api/summarize 엔드포인트 호출 — API 키는 서버에서 처리
  var resp = await fetch('/api/summarize', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      content:   content,
      fileTitle: titleEl ? titleEl.textContent : '문서',
      fileExt:   extEl   ? extEl.textContent   : ''
    })
  });

  // 서버 오류 응답 처리 (Handle server error response)
  if (!resp.ok) {
    var errData = await resp.json().catch(function() { return {}; });
    throw new Error(errData.error || 'HTTP ' + resp.status);
  }

  var data = await resp.json();
  if (!data.result) throw new Error('서버 응답에서 결과를 추출할 수 없습니다.');
  return data.result;
}

// 타이핑 효과로 텍스트를 삽입하는 함수 (Insert text with typing animation)
function typewriterInsert(textarea, newText, onDone) {
  var existing = textarea.value;
  var separator = existing ? '\n\n' : '';
  var prefix = separator + '━━━━━━━━━━━━━━━━━━\n🤖 AI 요약 결과\n━━━━━━━━━━━━━━━━━━\n';
  var full = existing + prefix + newText;
  var idx  = (existing + prefix).length;

  textarea.value = existing + prefix;
  textarea.scrollTop = textarea.scrollHeight;

  function typeNext() {
    if (idx >= full.length) {
      if (onDone) onDone();
      return;
    }
    // 한 번에 1~3 글자씩 타이핑하여 자연스러운 속도 연출
    var chunk = Math.min(2 + Math.floor(Math.random() * 3), full.length - idx);
    textarea.value = full.slice(0, idx + chunk);
    idx += chunk;
    textarea.scrollTop = textarea.scrollHeight;
    setTimeout(typeNext, 18 + Math.random() * 22);
  }
  typeNext();
}

// 실제 AI 요약 실행 함수 (Execute AI Summary)
async function doAISummary() {
  var btn = document.getElementById('btn-summary');
  var ta  = document.getElementById('memo-ta');

  // 버튼 로딩 상태 (Button loading state)
  btn.disabled = true;
  btn.textContent = '⏳ 분석 중...';
  showMemoSt('🤖 AI가 문서를 분석하는 중…');

  try {
    // 현재 문서 텍스트 추출 (Extract current document text)
    var content = extractCurrentText();

    if (!content || content.length < 10) {
      showMemoSt('⚠️ 요약할 내용이 없습니다');
      btn.disabled = false;
      btn.textContent = '🤖 AI 요약';
      return;
    }

    // 서버 프록시를 통해 요약 요청 (Request summary via server proxy)
    var result = await callSummaryAPI(content);

    // 타이핑 효과로 결과 삽입 (Insert result with typing effect)
    showMemoSt('✍️ AI 요약을 작성 중…');
    typewriterInsert(ta, result, function() {
      saveMemo();
      showMemoSt('✅ 요약 완료!');
      btn.disabled = false;
      btn.textContent = '🤖 AI 요약';
    });

  } catch (err) {
    console.error('AI 요약 오류:', err);
    var errMsg = err.message || '알 수 없는 오류';

    // 서버 키 미설정 오류 안내 (Guide user when server key is not set)
    if (errMsg.includes('ANTHROPIC_API_KEY') || errMsg.includes('503')) {
      showMemoSt('❌ 서버 API 키 미설정');
      alert('서버에 ANTHROPIC_API_KEY가 설정되지 않았습니다.\n\nVercel 환경변수 또는 로컬 .env 파일을 확인해주세요.');
    } else {
      showMemoSt('❌ 오류: ' + errMsg.slice(0, 40));
      var errorText = '\n\n[AI 요약 오류]\n' + errMsg;
      ta.value = ta.value + errorText;
      saveMemo();
    }

    btn.disabled = false;
    btn.textContent = '🤖 AI 요약';
  }
}

// AI 요약 버튼 클릭 이벤트 (AI Summary Button Click Event)
document.getElementById('btn-summary').addEventListener('click', function() {
  doAISummary();
});

// ═══════════════════════════════════════
// FILE SYSTEM
// ═══════════════════════════════════════
async function loadDir(dir) {
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('library').style.display = 'block';
  document.getElementById('lib-folder').textContent = '📂 ' + dir.name;
  document.getElementById('shelf').innerHTML = '<div class="loading">🕯️ <span>책장을 채우는 중<span class="dot"></span></span></div>';
  var files = [];
  for await (var [name, handle] of dir.entries()) {
    if (handle.kind === 'file') {
      var ext = name.split('.').pop().toLowerCase();
      if (EXT.includes(ext)) {
        var file = await handle.getFile();
        files.push({name: name, ext: ext, type: file.type || MIME[ext] || 'text/plain', file: file, size: file.size});
      }
    }
  }
  if (files.length) renderShelf(files);
  else document.getElementById('shelf').innerHTML = '<div class="empty">지원되는 파일이 없습니다.</div>';
}

async function pickFolder() {
  if (!('showDirectoryPicker' in window)) { alert('Chrome/Edge 86+에서 지원됩니다.'); return; }
  try {
    var dir = await window.showDirectoryPicker({mode: 'read'});
    await saveLastDir(dir);
    await loadDir(dir);
  } catch(e) { if (e.name !== 'AbortError') console.error(e); }
}

document.getElementById('btn-pick').addEventListener('click', async function() {

function rand(s) { var x = Math.sin(s + 1) * 10000; return x - Math.floor(x); }

function renderShelf(files) {
  var wrap = document.getElementById('shelf'); wrap.innerHTML = '';
  var n = files.length;
  var per = n <= 6 ? n : n <= 14 ? Math.ceil(n / 2) : Math.ceil(n / Math.ceil(n / 12));
  for (var i = 0; i < files.length; i += per) {
    var rowFiles = files.slice(i, i + per);
    var ri = Math.floor(i / per);
    var unit = document.createElement('div'); unit.className = 'shelf-unit';
    var row  = document.createElement('div'); row.className  = 'books-row';
    rowFiles.forEach(function(fd, bi) {
      var h = 200 + Math.floor(rand(ri * 100 + bi) * 90);
      var w = 34  + Math.floor(rand(ri * 100 + bi + 50) * 32);
      row.appendChild(makeBookEl(fd, COLORS[(ri * per + bi) % COLORS.length], h, w, Math.min(bi * 55 + ri * 120, 1400)));
    });
    var board = document.createElement('div'); board.className = 'shelf-board';
    unit.appendChild(row); unit.appendChild(board); wrap.appendChild(unit);
  }
}

function makeBookEl(fd, color, h, w, delay) {

// ═══════════════════════════════════════
// LOAD CONTENT
// ═══════════════════════════════════════
async function loadContent(fd) {
  var body = document.getElementById('pg-body');
  var type = fd.type, ext = fd.ext, name = fd.name, file = fd.file;

  if (type && type.startsWith('image/')) {
    var src = file ? URL.createObjectURL(file) : '';
    body.innerHTML = src
      ? '<div class="img-viewer"><img src="' + src + '" alt="' + esc(name) + '"></div>'
      : '<p style="padding:1rem;color:#888;font-style:italic">이미지를 불러올 수 없습니다</p>';
    setProgUI(100); lsSet(pKey(name) + 'p', 100); spineUpdate(name, 100);

  } else if (type === 'application/pdf' && file) {
    body.style.padding = '0'; body.style.overflow = 'hidden'; body.style.display = 'flex'; body.style.flexDirection = 'column';
    body.innerHTML = '<div class="pdf-wrap" id="pdf-wrap"><div class="pdf-loading">📄 PDF 불러오는 중…</div></div>';
    renderPDF(file, name);

  } else {
    var text = '';
    if (file) { try { text = await file.text(); } catch(e) { text = '파일을 읽을 수 없습니다.'; } }
    var isCode = ['js','json','css','html','py','ts','jsx','tsx','java','xml','csv','log'].indexOf((ext||'').toLowerCase()) >= 0;
    var isMd   = ['md','markdown'].indexOf((ext||'').toLowerCase()) >= 0;
    body.innerHTML = isCode ? '<pre>' + esc(text) + '</pre>' : isMd ? renderMd(text) : '<div style="white-space:pre-wrap">' + esc(text) + '</div>';
    requestAnimationFrame(function() { requestAnimationFrame(function() { attachProg(body, name); }); });
  }
}

// ═══════════════════════════════════════
// PDF RENDERER
// ═══════════════════════════════════════
async function renderPDF(file, name) {
  var wrap = null;
  for (var i = 0; i < 30; i++) {
    wrap = document.getElementById('pdf-wrap');
    if (wrap) break;
    await sleep(50);
  }
  if (!wrap) return;
  try {
    var lib = window['pdfjs-dist/build/pdf'];
    if (!lib) { wrap.innerHTML = '<div class="pdf-loading">PDF.js를 불러올 수 없습니다</div>'; return; }
    lib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    var buf = await file.arrayBuffer();
    var pdf = await lib.getDocument({data: buf}).promise;
    wrap.innerHTML = '';
    for (var j = 1; j <= pdf.numPages; j++) {
      var page = await pdf.getPage(j);
      var vp   = page.getViewport({scale: 1.4});
      var cvs  = document.createElement('canvas');
      cvs.width = vp.width; cvs.height = vp.height; cvs.style.width = '100%';
      wrap.appendChild(cvs);
      await page.render({canvasContext: cvs.getContext('2d'), viewport: vp}).promise;
    }
    var top = parseFloat(lsGet(pKey(name), '0'));
    if (top > 0) wrap.scrollTop = top;
    setProgUI(parseInt(lsGet(pKey(name) + 'p', '0')));
    attachProg(wrap, name);
  } catch(err) {
    console.error(err);
    if (wrap) wrap.innerHTML = '<div class="pdf-loading">렌더링 오류: ' + esc(err.message) + '</div>';
  }
}

// HELPERS
// ═══════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
function renderMd(t) {
  return t
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p style="margin:.6rem 0">')
    .replace(/\n/g,'<br>');
}

async function animateBookOpen(fd, color) {
  var bookWrap = document.querySelector('.book-wrap[data-f="' + CSS.escape(fd.name) + '"]');
  var modal    = document.getElementById('book-modal');
  var spot     = document.getElementById('book-spotlight');
  var scene    = document.getElementById('scene');
  var ob       = document.getElementById('open-book');

  // 1. 책 위치
  var fromRect = null;
  if (bookWrap) {
    var sp2 = bookWrap.querySelector('.book-spine');
    fromRect = (sp2 || bookWrap).getBoundingClientRect();
  }

  // 2. 스포트라이트 (책 위치)
  if (fromRect && spot) {
    var scx = ((fromRect.left + fromRect.right) / 2).toFixed(0);
    var scy = ((fromRect.top  + fromRect.bottom)/ 2).toFixed(0);
    spot.style.background = 'radial-gradient(ellipse 28% 38% at ' + scx + 'px ' + scy + 'px, rgba(255,230,140,.28) 0%, rgba(255,200,80,.06) 45%, transparent 70%)';
    spot.classList.add('on');
  }

  // 3. 비네트
  var vig = document.createElement('div');
  vig.className = 'cinema-vignette';
  document.body.appendChild(vig);
  setTimeout(function() { vig.classList.add('on'); }, 10);

  // 4. 먼지
  if (fromRect) {
    spawnDust(fromRect, 20);
    setTimeout(function() { spawnDust(fromRect, 10); }, 170);
  }

  // 5. 책 날기
  await flyBook(fromRect, color);

  // 6. 충격파
  if (scene) {
    var tr = scene.getBoundingClientRect();
    var tx = tr.left + tr.width * .25, ty = tr.top + tr.height * .5;
    spawnShockwave(tx, ty, 0);
    spawnShockwave(tx, ty, 170);
  }

  // 7. 플래시
  var flash = document.createElement('div');
  flash.className = 'screen-flash';
  document.body.appendChild(flash);
  setTimeout(function() { flash.remove(); }, 420);

  // 8. 모달 오픈
  modal.classList.add('open');

  // 9. 스포트라이트 중앙
  if (spot) spot.style.background = 'radial-gradient(ellipse 55% 65% at 50% 45%, rgba(255,230,140,.16) 0%, rgba(255,200,80,.04) 50%, transparent 72%)';

  // 10. 착지 바운스
  await sleep(75);
  if (ob) {
    ob.classList.remove('book-landing');
    void ob.offsetWidth;
    ob.classList.add('book-landing');
    setTimeout(function() { ob.classList.remove('book-landing'); }, 700);
  }

  // 11. 커버 shimmer — 커버가 닫혀 있는 첫 순간에 실행
  var cf = document.getElementById('cover-front');
  if (cf) {
    var sh = document.createElement('div');
    sh.className = 'cover-shimmer-layer';
    cf.appendChild(sh);
    setTimeout(function() { if (sh.parentNode) sh.remove(); }, 700);
  }

  // 12. 페이지 flutter — shimmer 직후 커버 열리면서 페이지들이 펄럭임
  setTimeout(function() { flutterPages(scene); }, 120);
  setTimeout(function() { flutterPages(scene); }, 380);

  // 13. 클린업
  setTimeout(function() {
    if (spot) spot.classList.remove('on');
    vig.classList.remove('on');
    setTimeout(function() { vig.remove(); }, 600);
  }, 950);
}

function flyBook(fromRect, color) {
  return new Promise(function(resolve) {
    if (!fromRect) { resolve(); return; }
    var scene = document.getElementById('scene');
    if (!scene) { resolve(); return; }

    var toRect = scene.getBoundingClientRect();
    var toX = toRect.left + toRect.width  * .25;
    var toY = toRect.top  + toRect.height * .5;
    var fX  = fromRect.left + fromRect.width  / 2;
    var fY  = fromRect.top  + fromRect.height / 2;

    // Bezier arc
    var c1x = fX + (toX - fX) * .15, c1y = fY - 150;
    var c2x = fX + (toX - fX) * .78, c2y = toY - 70;

    function bez(t, p0, p1, p2, p3) {
      var u = 1 - t;
      return u*u*u*p0 + 3*u*u*t*p1 + 3*u*t*t*p2 + t*t*t*p3;
    }

    var clone = document.createElement('div');
    clone.className = 'book-fly-clone';
    clone.style.width      = fromRect.width  + 'px';
    clone.style.height     = fromRect.height + 'px';
    clone.style.background = color;
    clone.style.transform  = 'translate(' + fX + 'px,' + fY + 'px) translate(-50%,-50%)';
    document.body.appendChild(clone);

    var DUR = 680, startTime = null;
    var trailInt = setInterval(function() {
      var r = clone.getBoundingClientRect();
      if (!r.width) return;
      var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      var tr = document.createElement('div');
      tr.className = 'energy-trail';
      var s = Math.max(fromRect.width * .65, 22);
      tr.style.width  = s + 'px'; tr.style.height = s + 'px';
      tr.style.left   = cx + 'px'; tr.style.top    = cy + 'px';
      tr.style.transition = 'opacity .25s ease';
      document.body.appendChild(tr);
      setTimeout(function() { tr.style.opacity = '0'; }, 30);
      setTimeout(function() { if (tr.parentNode) tr.remove(); }, 280);
    }, 30);

    function eio(t) { return t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

    function step(ts) {
      if (!startTime) startTime = ts;
      var raw = Math.min((ts - startTime) / DUR, 1);
      var e   = eio(raw);

      var x     = bez(e, fX, c1x, c2x, toX);
      var y     = bez(e, fY, c1y, c2y, toY);
      var rot   = Math.sin(e * Math.PI) * -22;
      var scale = 1 + Math.sin(e * Math.PI) * .42;
      var op    = raw > .7 ? 1 - (raw - .7) / .3 : 1;
      var glow  = Math.round(Math.sin(e * Math.PI) * 28);
      var bri   = (1 + Math.sin(e * Math.PI) * .6).toFixed(2);

      clone.style.transform = 'translate(' + x + 'px,' + y + 'px) translate(-50%,-50%) rotate(' + rot + 'deg) scale(' + scale + ')';
      clone.style.opacity = op;
      clone.style.filter  = 'brightness(' + bri + ') drop-shadow(0 0 ' + glow + 'px rgba(255,200,80,.75))';

      if (raw < 1) requestAnimationFrame(step);
      else {
        clearInterval(trailInt);
        clone.remove();
        resolve();
      }
    }
    requestAnimationFrame(step);
  });
}

function spawnShockwave(x, y, delay) {
  setTimeout(function() {
    var el = document.createElement('div');
    el.className = 'shockwave';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.style.width = '70px'; el.style.height = '70px';
    document.body.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, 950);
  }, delay);
}

function spawnDust(fromRect, count) {
  var cx = fromRect.left + fromRect.width  / 2;
  var cy = fromRect.top  + fromRect.height * .35;
  var dustColors = ['rgba(212,148,31,.72)','rgba(245,234,213,.55)','rgba(139,94,60,.65)','rgba(255,200,80,.55)'];
  for (var i = 0; i < count; i++) {
    (function(i) {
      var d = document.createElement('div');
      d.className = 'book-dust';
      var size  = 2 + Math.random() * 7;
      var angle = -(Math.PI * (.3 + Math.random() * .95));
      var dist  = 22 + Math.random() * 85;
      var tx = Math.cos(angle) * dist + (Math.random() - .5) * 18;
      var ty = Math.sin(angle) * dist;
      var dur = .32 + Math.random() * .42;
      d.style.width      = size + 'px'; d.style.height = size + 'px';
      d.style.left       = (cx + (Math.random() - .5) * fromRect.width * .55) + 'px';
      d.style.top        = (cy + Math.random() * fromRect.height * .35) + 'px';
      d.style.background = dustColors[i % dustColors.length];
      d.style.transition = 'transform ' + dur + 's cubic-bezier(.2,.8,.4,1) ' + (i * .018) + 's, opacity ' + (dur + .14) + 's ease ' + (i * .012) + 's';
      document.body.appendChild(d);
      setTimeout(function() {
        d.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(0) rotate(' + (Math.random() * 360) + 'deg)';
        d.style.opacity   = '0';
      }, 16);
      setTimeout(function() { if (d.parentNode) d.remove(); }, 870);
    })(i);
  }
}

function flutterPages(scene) {
  if (!scene) return;
  // open-book에 직접 붙여서 overflow:hidden 의 영향을 받지 않게 함
  var ob = document.getElementById('open-book');
  if (!ob) return;
  var colors = [
    'hsl(40,10%,96%)','hsl(40,9%,92%)','hsl(40,8%,88%)','hsl(40,7%,84%)','hsl(40,6%,80%)'
  ];
  for (var i = 0; i < 5; i++) {
    (function(i) {
      var f = document.createElement('div');
      f.className = 'page-flutter-overlay';
      f.style.background = colors[i];
      f.style.opacity    = (0.72 - i * 0.1).toFixed(2);
      f.style.zIndex     = 8 - i;
      f.style.transform  = 'rotateY(0deg)';
      f.style.transition = 'none';
      // 그림자로 페이지 두께감
      f.style.boxShadow  = 'inset -8px 0 18px rgba(0,0,0,' + (.15 - i*.02) + '), -2px 0 8px rgba(0,0,0,.2)';
      ob.appendChild(f);

      // 각 페이지마다 시차를 두고 빠르게 넘김
      var delay  = 60 + i * 55;
      var dur    = 0.38 + i * 0.06;
      var angle  = -(165 + i * 4);

      setTimeout(function() {
        f.style.transition = 'transform ' + dur + 's cubic-bezier(.6,0,.15,1)';
        f.style.transform  = 'rotateY(' + angle + 'deg)';
      }, delay);

      // 넘어가는 중간에 그림자가 진해짐 (페이지 두께 느낌)
      setTimeout(function() {
        f.style.boxShadow = 'inset -2px 0 6px rgba(0,0,0,.08), 2px 0 14px rgba(0,0,0,.35)';
      }, delay + dur * 500);

      setTimeout(function() { if (f.parentNode) f.remove(); }, delay + (dur * 1000) + 300);
    })(i);
  }
}

// ═══════════════════════════════════════
// RESIZER
// ═══════════════════════════════════════
(function() {
  var R = document.getElementById('resizer');
  var S = document.getElementById('scene');
  var H = document.getElementById('rz-hint');
  var W = 0, HH = 0, drag = null;

  function initSize() { var r = S.getBoundingClientRect(); W = r.width; HH = r.height; apply(); }
  function apply() { S.style.width = W + 'px'; S.style.height = HH + 'px'; H.textContent = Math.round(W) + ' × ' + Math.round(HH); }

  R.querySelectorAll('.rz').forEach(function(h) {
    h.addEventListener('mousedown', function(e) {
      e.preventDefault(); e.stopPropagation();
      if (!W) initSize();
      drag = {d: h.dataset.d, x: e.clientX, y: e.clientY, W: W, H: HH, h: h};
      h.classList.add('active'); R.classList.add('resizing');
      document.body.style.cursor = getComputedStyle(h).cursor;
    });
  });
  document.addEventListener('mousemove', function(e) {
    if (!drag) return;
    var dx = e.clientX - drag.x, dy = e.clientY - drag.y, d = drag.d;
    var nw = drag.W, nh = drag.H;
    if (d.includes('e')) nw += dx; if (d.includes('w')) nw -= dx;
    if (d.includes('s')) nh += dy; if (d.includes('n')) nh -= dy;
    W  = Math.min(Math.max(nw, 420), window.innerWidth  - 40);
    HH = Math.min(Math.max(nh, 300), window.innerHeight - 40);
    apply();
  });
  document.addEventListener('mouseup', function() {
    if (!drag) return;
    drag.h.classList.remove('active'); R.classList.remove('resizing');
    document.body.style.cursor = ''; drag = null;
  });
  new MutationObserver(function() {
    if (document.getElementById('book-modal').classList.contains('open')) setTimeout(initSize, 50);
  }).observe(document.getElementById('book-modal'), {attributes: true, attributeFilter: ['class']});
})();

// ═══════════════════════════════════════
// AMBIENT SOUND
// ═══════════════════════════════════════
(function() {
  var ctx = null, master = null, active = [], cur = null;
  var SICONS = {rain:'🌧️', fire:'🔥', wind:'🍃', cafe:'☕', forest:'🌲', ocean:'🌊'};
  var volEl = document.getElementById('amb-vol');
  var togEl = document.getElementById('amb-toggle');
  var iconEl= document.getElementById('amb-icon');
  var menuEl= document.getElementById('amb-menu');

  function getCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      master = ctx.createGain(); master.gain.value = volEl.value / 100; master.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function mkNoise(type) {
    var a = getCtx(), len = a.sampleRate * 2, buf = a.createBuffer(1, len, a.sampleRate), d = buf.getChannelData(0);
    var b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (var i = 0; i < len; i++) {
      var w = Math.random() * 2 - 1;
      if (type === 'w') { d[i] = w * .5; }
      else if (type === 'b') { d[i] = (b0 = (b0 + .02*w)/1.02) * 3.5; }
      else { b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;b3=.8665*b3+w*.3104856;b4=.55*b4+w*.5329522;b5=-.7616*b5-w*.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11;b6=w*.115926; }
    }
    var s = a.createBufferSource(); s.buffer = buf; s.loop = true; return s;
  }
  function lfo(f, g) { var a=getCtx(),o=a.createOscillator(),gn=a.createGain(); o.frequency.value=f; gn.gain.value=g; o.connect(gn); o.start(); return {o:o,gn:gn}; }
  function filt(type, freq, Q) { var a=getCtx(),f=a.createBiquadFilter(); f.type=type; f.frequency.value=freq; if(Q) f.Q.value=Q; return f; }

  var BUILDERS = {
    rain: function() { var a=getCtx(),s=mkNoise('w'),lp=filt('lowpass',1400,.8),hp=filt('highpass',180),g=a.createGain(); g.gain.value=1.6; var l=lfo(.07,.22); l.gn.connect(g.gain); s.connect(hp);hp.connect(lp);lp.connect(g);g.connect(master);s.start(); return [s,l.o]; },
    fire: function() { var a=getCtx(),s=mkNoise('b'),lp=filt('lowpass',600),g=a.createGain(); g.gain.value=2.2; s.connect(lp);lp.connect(g);g.connect(master);s.start(); var c=mkNoise('w'),bp=filt('bandpass',3200,.4),cg=a.createGain(); cg.gain.value=.28; var l=lfo(8,.25); l.gn.connect(cg.gain); c.connect(bp);bp.connect(cg);cg.connect(master);c.start(); return [s,c,l.o]; },
    wind: function() { var a=getCtx(),s=mkNoise('p'),bp=filt('bandpass',520,.5),g=a.createGain(); g.gain.value=2; var l=lfo(.04,.5); l.gn.connect(g.gain); s.connect(bp);bp.connect(g);g.connect(master);s.start(); return [s,l.o]; },
    cafe: function() { var a=getCtx(),s=mkNoise('p'),lp=filt('lowpass',2200),hp=filt('highpass',200),g=a.createGain(); g.gain.value=.9; var l1=lfo(.13,.3),l2=lfo(.31,.3); l1.gn.connect(g.gain);l2.gn.connect(g.gain); s.connect(hp);hp.connect(lp);lp.connect(g);g.connect(master);s.start(); return [s,l1.o,l2.o]; },
    forest: function() { var a=getCtx(),s=mkNoise('p'),lp=filt('lowpass',900),g=a.createGain(); g.gain.value=.7; var l=lfo(.08,.35); l.gn.connect(g.gain); s.connect(lp);lp.connect(g);g.connect(master);s.start(); var s2=mkNoise('w'),bp2=filt('bandpass',4500,.8),g2=a.createGain(); g2.gain.value=.18; var l2=lfo(.22,.15); l2.gn.connect(g2.gain); s2.connect(bp2);bp2.connect(g2);g2.connect(master);s2.start(); return [s,s2,l.o,l2.o]; },
    ocean: function() { var a=getCtx(),s=mkNoise('b'),lp=filt('lowpass',700),g=a.createGain(); g.gain.value=2.5; var l=lfo(.12,.7); l.o.type='sine'; l.gn.connect(g.gain); s.connect(lp);lp.connect(g);g.connect(master);s.start(); var s2=mkNoise('w'),hp2=filt('highpass',1800),g2=a.createGain(); g2.gain.value=.22; var l2=lfo(.12,.2); l2.gn.connect(g2.gain); s2.connect(hp2);hp2.connect(g2);g2.connect(master);s2.start(); return [s,s2,l.o,l2.o]; }
  };

  function stopSound() {
    active.forEach(function(n) { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} });
    active = []; cur = null;
    document.querySelectorAll('.amb-btn').forEach(function(b) { b.classList.remove('on'); });
    togEl.classList.remove('playing'); iconEl.textContent = '🎵';
  }
  function playSound(name) {
    if (cur === name) { stopSound(); return; }
    stopSound();
    active = BUILDERS[name](); cur = name;
    document.querySelector('.amb-btn[data-s="' + name + '"]').classList.add('on');
    togEl.classList.add('playing'); iconEl.textContent = SICONS[name];
  }

  volEl.addEventListener('input', function() { if (master) master.gain.value = volEl.value / 100; });
  document.querySelectorAll('.amb-btn').forEach(function(b) { b.addEventListener('click', function() { playSound(b.dataset.s); }); });
  document.querySelector('.amb-stop').addEventListener('click', stopSound);
  togEl.addEventListener('click', function() { menuEl.classList.toggle('open'); });
  document.addEventListener('click', function(e) { if (!document.getElementById('ambient-panel').contains(e.target)) menuEl.classList.remove('open'); });
})();
</script>
</body>
</html>
