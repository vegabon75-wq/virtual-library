<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 가상 서재</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ===== Reset & Variables ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #110b05;
  --bg2:         #1a1008;
  --wood-dark:   #2e1a08;
  --wood-mid:    #4a2810;
  --wood-light:  #6b3a18;
  --wood-edge:   #8b5a28;
  --gold:        #c9a84c;
  --gold-light:  #e8c870;
  --gold-dim:    rgba(201,168,76,0.35);
  --text:        #ecdec0;
  --text-dim:    #7a6848;
  --text-mid:    #a89060;
  --overlay:     rgba(8,4,1,0.97);
  --panel-bg:    #0e0904;
  --panel-bg2:   #130c06;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Times New Roman', serif;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(80,40,10,0.4) 0%, transparent 60%);
}

/* ===== Scrollbars ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.55); }

/* ===== Header ===== */
.lib-header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 48px;
  background: linear-gradient(180deg, rgba(8,4,1,0.98) 0%, rgba(17,11,5,0.92) 100%);
  border-bottom: 1px solid var(--gold-dim);
  backdrop-filter: blur(8px);
}

.lib-logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.lib-logo-icon {
  font-size: 28px;
  filter: drop-shadow(0 0 8px rgba(201,168,76,0.5));
}

.lib-title {
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--gold);
  text-shadow: 0 0 24px rgba(201,168,76,0.35);
  font-weight: normal;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.book-count-badge {
  font-size: 12px;
  color: var(--text-mid);
  background: rgba(201,168,76,0.08);
  border: 1px solid var(--gold-dim);
  padding: 5px 14px;
  border-radius: 20px;
  letter-spacing: 1px;
}

.import-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  background: linear-gradient(135deg, #7a5810 0%, #c9a84c 100%);
  color: #1a1008;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.25s;
  box-shadow: 0 2px 12px rgba(201,168,76,0.3);
}

.import-btn:hover {
  background: linear-gradient(135deg, #c9a84c 0%, #e8c870 100%);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(201,168,76,0.45);
}

.import-btn:active { transform: translateY(0); }

#folderInput { display: none; }

/* ===== Bookshelf Container ===== */
.bookshelf-wrap {
  padding: 32px 40px 60px;
  min-height: calc(100vh - 72px);
}

/* ===== Empty State ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 65vh;
  gap: 18px;
  text-align: center;
  animation: fadeUp 0.6s ease;
}

.empty-icon-wrap {
  font-size: 90px;
  filter: drop-shadow(0 4px 16px rgba(201,168,76,0.2));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}

.empty-title {
  font-size: 22px;
  color: var(--gold);
  opacity: 0.7;
  letter-spacing: 2px;
}

.empty-desc {
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.8;
}

.empty-arrow {
  font-size: 28px;
  color: var(--gold-dim);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 1; }
}

/* ===== Shelf Unit ===== */
.shelf-unit { margin-bottom: 8px; }

.shelf-label {
  padding: 10px 16px 6px;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.shelf-books-row {
  display: flex;
  align-items: flex-end;
  gap: 5px;
  padding: 24px 24px 0 24px;
  min-height: 230px;
  background:
    linear-gradient(180deg, rgba(30,15,5,0.6) 0%, rgba(46,26,8,0.7) 100%);
  border-left: 5px solid var(--wood-light);
  border-right: 5px solid var(--wood-light);
  border-top: 2px solid rgba(139,90,40,0.3);
  flex-wrap: wrap;
  overflow: visible;
}
.shelf-books-row.drop-target { box-shadow: inset 0 0 0 2px rgba(201,168,76,0.45); }
.empty-hint { text-align: center; color: var(--text-dim); font-size: 13px; padding: 24px 16px; }

/* 책등 진행률 바 */
.book-progress { position: absolute; left: 0; right: 0; bottom: 0; height: 3px; background: rgba(0,0,0,0.4); z-index: 2; }
.book-progress-fill { height: 100%; width: 0; background: var(--gold); transition: width 0.3s; }

/* 검색 입력 / 헤더 아이콘 버튼 */
.lib-search-input {
  background: rgba(46,26,8,0.55); border: 1px solid var(--gold-dim); border-radius: 6px;
  color: var(--text); padding: 7px 12px; font-size: 13px; width: 210px; outline: none;
  font-family: inherit; transition: width 0.2s, border-color 0.2s;
}
.lib-search-input:focus { border-color: var(--gold); width: 280px; }
.lib-search-input::placeholder { color: var(--text-dim); }
.icon-btn {
  background: rgba(46,26,8,0.55); border: 1px solid var(--gold-dim); border-radius: 6px;
  color: var(--gold); width: 36px; height: 34px; cursor: pointer; font-size: 15px; transition: all 0.2s;
}
.icon-btn:hover { background: rgba(201,168,76,0.18); border-color: var(--gold); }

/* 검색 결과 */
.search-results { padding: 8px 2px 40px; }
.search-info { color: var(--text-mid); font-size: 13px; padding: 10px 12px 16px; }
#searchIndexStatus { color: var(--gold-dim); font-size: 11px; margin-left: 8px; }
.search-item {
  display: flex; gap: 12px; align-items: flex-start; padding: 12px 14px;
  border: 1px solid rgba(201,168,76,0.15); border-radius: 8px; margin-bottom: 8px;
  cursor: pointer; background: rgba(46,26,8,0.3); transition: all 0.18s;
}
.search-item:hover { border-color: var(--gold-dim); background: rgba(46,26,8,0.6); transform: translateX(2px); }
.search-item-title { color: var(--gold-light); font-size: 14px; margin-bottom: 5px; }
.search-item-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; }
.search-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(201,168,76,0.15); color: var(--gold); }
.search-tag.memo { background: rgba(120,150,210,0.15); color: #aec0ee; }
.search-snippet { color: var(--text-mid); font-size: 12px; line-height: 1.65; word-break: break-word; }
.search-snippet mark { background: rgba(201,168,76,0.35); color: var(--text); padding: 0 2px; border-radius: 2px; }

/* 읽기 모드 필터 (세피아 / 야간 반전) */
#pdfCanvasWrap.mode-sepia { background: radial-gradient(ellipse at center, #241a0e 0%, #160f06 100%); }
#pdfCanvasWrap.mode-sepia #pdfCanvas { filter: sepia(0.6) contrast(0.92) brightness(0.98); }
#pdfCanvasWrap.mode-night #pdfCanvas { filter: invert(1) hue-rotate(180deg) brightness(0.92) contrast(0.95); }

/* 앰비언트 사운드 위젯 */
#ambientWidget { position: fixed; right: 18px; bottom: 18px; z-index: 3000; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
#ambientToggle { width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--gold-dim); background: rgba(20,12,5,0.92); color: var(--gold); font-size: 20px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.5); transition: all 0.2s; }
#ambientToggle:hover { transform: scale(1.06); border-color: var(--gold); }
#ambientToggle.playing { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.25), 0 4px 16px rgba(0,0,0,0.5); }
#ambientPanel { width: 212px; background: rgba(20,12,5,0.97); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.6); }
#ambientPanel.hidden { display: none; }
.amb-title { font-size: 12px; color: var(--gold); letter-spacing: 1px; text-align: center; margin-bottom: 12px; }
.amb-sounds { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.amb-sound { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 6px; background: rgba(255,255,255,0.04); border: 1px solid var(--gold-dim); border-radius: 8px; color: var(--text); font-size: 18px; cursor: pointer; transition: all 0.18s; }
.amb-sound span { font-size: 11px; color: var(--text-mid); }
.amb-sound:hover { background: rgba(201,168,76,0.12); }
.amb-sound.on { background: rgba(201,168,76,0.22); border-color: var(--gold); }
.amb-sound.on span { color: var(--gold-light); }
.amb-vol-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.amb-vol-row span { font-size: 12px; color: var(--text-mid); }
#ambVol { flex: 1; accent-color: var(--gold); }
.amb-stop { width: 100%; background: rgba(180,60,60,0.12); border: 1px solid rgba(200,80,80,0.3); color: rgba(220,130,130,0.9); border-radius: 8px; padding: 7px; cursor: pointer; font-size: 12px; transition: all 0.18s; }
.amb-stop:hover { background: rgba(180,60,60,0.22); }

/* 독서 통계 모달 */
#statsModal { position: fixed; inset: 0; z-index: 4000; display: flex; align-items: center; justify-content: center; }
#statsModal.hidden { display: none; }
.stats-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(3px); }
.stats-box { position: relative; width: min(520px, 92vw); max-height: 86vh; overflow-y: auto; background: linear-gradient(160deg, #1a0e06, #110903); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 24px 26px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
.stats-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; line-height: 1; }
.stats-close:hover { color: var(--gold-light); }
.stats-title { font-size: 18px; color: var(--gold-light); margin-bottom: 18px; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: rgba(201,168,76,0.07); border: 1px solid rgba(201,168,76,0.18); border-radius: 8px; padding: 14px 8px; text-align: center; }
.stat-num { font-size: 24px; color: var(--gold-light); line-height: 1; }
.stat-label { font-size: 11px; color: var(--text-mid); margin-top: 6px; }
.stats-sec-title { font-size: 12px; color: var(--text-mid); letter-spacing: 1px; margin-bottom: 8px; }
.stats-bar { display: flex; height: 12px; border-radius: 6px; overflow: hidden; background: rgba(255,255,255,0.06); }
.bar-seg { height: 100%; transition: width 0.5s; }
.bar-seg.done { background: #6aaa6a; }
.bar-seg.reading { background: var(--gold); }
.bar-seg.none { background: rgba(255,255,255,0.08); }
.stats-legend { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
.stats-legend span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-mid); }
.stats-legend i { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
.stats-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.stats-row-name { flex: 0 0 40%; font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stats-row-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.stats-row-fill { height: 100%; background: var(--gold); border-radius: 3px; }
.stats-row-pct { flex: 0 0 38px; text-align: right; font-size: 12px; color: var(--gold-light); }

.shelf-plank {
  height: 26px;
  background:
    linear-gradient(0deg,
      #1e0e04 0%, var(--wood-dark) 30%, var(--wood-mid) 55%,
      var(--wood-light) 72%, #9b6830 85%, var(--wood-edge) 100%
    );
  border-bottom: 3px solid #1a0c04;
  box-shadow:
    0 6px 16px rgba(0,0,0,0.7),
    0 2px 4px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,200,120,0.15);
}

.shelf-side-shadow {
  height: 10px;
  background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
  border-left: 5px solid rgba(0,0,0,0.3);
  border-right: 5px solid rgba(0,0,0,0.3);
}

/* ===== Book Spine ===== */
.book {
  position: relative;
  flex-shrink: 0;
  width: 54px;
  cursor: pointer;
  transform-origin: bottom center;
  transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  will-change: transform;
}

.book:hover { transform: translateY(-14px) scale(1.03); }
.book:hover .book-spine {
  box-shadow:
    4px 0 16px rgba(0,0,0,0.7),
    -1px 0 0 rgba(255,255,255,0.08),
    0 -6px 24px rgba(201,168,76,0.25);
}

.book-spine {
  width: 100%;
  height: 100%;
  border-radius: 2px 1px 1px 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow:
    4px 0 10px rgba(0,0,0,0.6),
    -1px 0 0 rgba(255,255,255,0.07),
    inset -4px 0 8px rgba(0,0,0,0.35),
    inset 3px 0 6px rgba(255,255,255,0.08);
  transition: box-shadow 0.22s;
}

.book-spine::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 5px; height: 100%;
  background: linear-gradient(90deg,
    rgba(0,0,0,0.45) 0%, rgba(255,255,255,0.06) 100%);
}

.book-spine::after {
  content: '';
  position: absolute;
  right: 0; top: 0;
  width: 10px; height: 100%;
  background: linear-gradient(90deg,
    transparent 0%, rgba(255,255,255,0.04) 50%, rgba(0,0,0,0.15) 100%);
}

.book-title-vert {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-size: 10.5px;
  color: rgba(255,255,255,0.88);
  text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  padding: 10px 0;
  max-height: 88%;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.8px;
  z-index: 1;
  user-select: none;
  line-height: 1.3;
}

.book-band {
  position: absolute;
  bottom: 16px;
  left: 8px; right: 8px;
  height: 1.5px;
  background: rgba(201,168,76,0.4);
  border-radius: 1px;
}

.book-del {
  position: absolute;
  top: -11px; left: 50%;
  transform: translateX(-50%) scale(0.8);
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  border: 1px solid rgba(210,90,90,0.5);
  background: rgba(28,12,8,0.95);
  color: rgba(232,140,140,0.95);
  font-size: 11px; line-height: 1; cursor: pointer;
  opacity: 0; pointer-events: none;
  transition: opacity 0.18s, transform 0.18s, background 0.18s, color 0.18s;
  z-index: 6;
}
.book:hover .book-del { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
.book-del:hover { background: rgba(185,40,40,0.95); color: #fff; border-color: rgba(255,120,120,0.85); }

/* ===== Drag to reorder ===== */
.book.dragging { opacity: 0.35; }
.book.dragging .book-del { display: none; }
.book.insert-left::before,
.book.insert-right::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 3px;
  background: var(--gold);
  border-radius: 2px;
  box-shadow: 0 0 8px rgba(201,168,76,0.7);
  z-index: 7;
}
.book.insert-left::before { left: -4px; }
.book.insert-right::after { right: -4px; }

/* ===== Animated Book ===== */
#animBook {
  position: fixed;
  z-index: 2000;
  pointer-events: none;
  border-radius: 4px;
  overflow: visible;
  perspective: 1800px;               /* 3D 펼침 원근감 */
}

/* 오른쪽 흰 페이지 (표지가 열리면 드러남) */
#animBookPages {
  position: absolute;
  inset: 0;
  z-index: 1;
  border-radius: 0 4px 4px 0;
  background: #fdfdf8;
  box-shadow: inset 14px 0 22px -12px rgba(0,0,0,0.22);   /* 왼쪽=책등 그림자 */
  overflow: hidden;
}

/* 표지: 왼쪽(책등) 기준으로 열리며 앞/뒷면을 가짐 */
#animBookCover {
  position: absolute;
  inset: 0;
  z-index: 2;
  transform-origin: left center;
  transform-style: preserve-3d;
}
.cover-front, .cover-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
}
.cover-front {
  z-index: 2;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px 30px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}
.cover-front::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent 0px, transparent 38px,
    rgba(0,0,0,0.06) 38px, rgba(0,0,0,0.06) 39px
  );
  pointer-events: none;
}
/* 뒷면: 열리면 왼쪽 흰 페이지가 됨 */
.cover-back {
  z-index: 1;
  transform: rotateY(180deg);
  background: #fdfdf8;
  border-radius: 4px 0 0 4px;
  box-shadow: inset -14px 0 22px -12px rgba(0,0,0,0.22);   /* 오른쪽=책등 그림자 */
}

.cover-icon   { font-size: 54px; z-index: 1; }
.cover-title  {
  font-size: 18px; color: rgba(255,255,255,0.92);
  text-align: center; z-index: 1; font-family: Georgia, serif;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6); letter-spacing: 1px;
  line-height: 1.5; max-width: 340px;
}
.cover-line  {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  width: 50%; height: 2px; background: rgba(201,168,76,0.5); border-radius: 1px;
}
.cover-line2 {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  width: 30%; height: 1px; background: rgba(201,168,76,0.3); border-radius: 1px;
}

/* ===== Workspace Overlay ===== */
#workspaceOverlay {
  position: fixed;
  inset: 0;
  z-index: 1500;
  background: var(--overlay);
  display: none;
  flex-direction: column;
  opacity: 0;
}

.ws-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 28px;
  background: rgba(46,26,8,0.7);
  border-bottom: 1px solid var(--gold-dim);
  flex-shrink: 0;
  backdrop-filter: blur(4px);
}

.ws-book-title {
  font-size: 16px;
  color: var(--gold);
  letter-spacing: 2px;
  max-width: 60%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.ws-close-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 18px;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--gold-dim);
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.22s;
  font-family: Georgia, serif;
}

.ws-close-btn:hover {
  color: var(--gold);
  border-color: var(--gold);
  background: rgba(201,168,76,0.1);
}

.ws-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== PDF Panel ===== */
.pdf-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(201,168,76,0.18);
  background: var(--panel-bg);
  overflow: hidden;
}

.pdf-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 16px;
  background: rgba(46,26,8,0.5);
  border-bottom: 1px solid rgba(201,168,76,0.18);
  flex-shrink: 0;
}
.pdf-ctrl-group { display: flex; align-items: center; gap: 12px; }

<script>
/* =============================================================
   IndexedDB Helpers
   ============================================================= */
const DB_NAME    = 'VirtualLibraryDB_v2';
const DB_VERSION = 3;
let db;
let dbReady;   // 캐시된 open Promise

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = ev => {
      const d = ev.target.result;
      if (!d.objectStoreNames.contains('books')) {
        d.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
      }
      if (!d.objectStoreNames.contains('memos')) {
        const ms = d.createObjectStore('memos', { keyPath: 'id', autoIncrement: true });
        ms.createIndex('byBook', 'bookId');
      }
      if (!d.objectStoreNames.contains('chats')) {
        d.createObjectStore('chats', { keyPath: 'bookId' });   // 책별 대화 1레코드
      }
      if (!d.objectStoreNames.contains('meta')) {
        d.createObjectStore('meta', { keyPath: 'key' });       // 책 정렬 순서 등 메타데이터
      }
    };

    req.onsuccess = ev => {
      db = ev.target.result;
      // 다른 탭이 새 버전으로 업그레이드하려 하면 이 연결을 닫아 차단(blocked)을 방지
      db.onversionchange = () => { try { db.close(); } catch (e) {} db = undefined; dbReady = undefined; };
      res(db);
    };
    req.onerror   = ev => rej(ev.target.error);
    req.onblocked = () => rej(new Error('다른 탭에서 이전 버전을 사용 중입니다. 이 사이트의 다른 탭을 모두 닫고 새로고침 해주세요.'));
  });
}

// 모든 IndexedDB 작업 전에 db 준비를 보장 (열기 실패 시 다음 호출에서 재시도)
function ensureDB() {
  if (db) return Promise.resolve(db);
  if (!dbReady) dbReady = openDB().catch(err => { dbReady = undefined; throw err; });
  return dbReady;
}

async function idbAdd(store, data) {
  const d = await ensureDB();
  return new Promise((res, rej) => {
    const r = d.transaction(store, 'readwrite').objectStore(store).add(data);
    r.onsuccess = ev => res(ev.target.result);
    r.onerror   = ev => rej(ev.target.error);
  });
}

async function idbPut(store, data) {
  const d = await ensureDB();
  return new Promise((res, rej) => {
    const r = d.transaction(store, 'readwrite').objectStore(store).put(data);
    r.onsuccess = ev => res(ev.target.result);
    r.onerror   = ev => rej(ev.target.error);
  });
}

async function idbGetAll(store) {
  const d = await ensureDB();
  return new Promise((res, rej) => {
    const r = d.transaction(store, 'readonly').objectStore(store).getAll();
    r.onsuccess = ev => res(ev.target.result);
    r.onerror   = ev => rej(ev.target.error);
  });
}

async function idbGet(store, id) {
  const d = await ensureDB();
  return new Promise((res, rej) => {
    const r = d.transaction(store, 'readonly').objectStore(store).get(id);
    r.onsuccess = ev => res(ev.target.result);
    r.onerror   = ev => rej(ev.target.error);
  });
}

async function idbDelete(store, id) {
  const d = await ensureDB();
  return new Promise((res, rej) => {
    const r = d.transaction(store, 'readwrite').objectStore(store).delete(id);
    r.onsuccess = () => res();
    r.onerror   = ev => rej(ev.target.error);
  });
}

async function idbGetByIndex(store, indexName, val) {
  const d = await ensureDB();
  return new Promise((res, rej) => {
    const os = d.transaction(store, 'readonly').objectStore(store);
    const r  = os.index(indexName).getAll(IDBKeyRange.only(val));
    r.onsuccess = ev => res(ev.target.result);
    r.onerror   = ev => rej(ev.target.error);
  });
}

async function idbClear(store) {
  const d = await ensureDB();
  return new Promise((res, rej) => {
    const r = d.transaction(store, 'readwrite').objectStore(store).clear();
    r.onsuccess = () => res();
    r.onerror   = ev => rej(ev.target.error);
  });
}

const ZOOM_MIN = 0.4, ZOOM_MAX = 3.0, ZOOM_STEP = 0.2;
let dragSrcId   = null;              // 드래그 중인 책 id (순서 변경용)
let progressMap = {};                // bookId → { page, total }  (이어 읽기/진행률)
let fulltextMap = {};                // bookId → 추출 본문 (검색 색인)

  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* =============================================================
   Book visual palette
   ============================================================= */
const PALETTES = [
  'linear-gradient(155deg,#7a1c2e 0%,#420e18 100%)',
  'linear-gradient(155deg,#1c3a7a 0%,#0e1e44 100%)',
  'linear-gradient(155deg,#1a5c38 0%,#0c3520 100%)',
  'linear-gradient(155deg,#5c3a1a 0%,#361e08 100%)',
  'linear-gradient(155deg,#4a1c6b 0%,#2a0e40 100%)',
  'linear-gradient(155deg,#6b5a1a 0%,#3e3408 100%)',
  'linear-gradient(155deg,#1a5a6b 0%,#0c3440 100%)',
  'linear-gradient(155deg,#6b1a4a 0%,#40102c 100%)',
  'linear-gradient(155deg,#2c5a1a 0%,#16360c 100%)',
  'linear-gradient(155deg,#1a3c6b 0%,#0c2040 100%)',
];

const BOOK_HEIGHTS = [168, 185, 175, 192, 160, 180, 195, 163, 177, 188, 165, 183];

/* =============================================================
   Render Bookshelf
   ============================================================= */
const SHELF_COUNT = 3;
let shelfLayout = [[], [], []];   // 각 선반의 책 id 배열 (소속 + 순서)

function bookById(id) { return books.find(b => b.id === id); }

// 책 id 배열을 n개 선반에 순서 유지하며 균등 분배
function distributeShelves(ids, n) {
  const out  = Array.from({ length: n }, () => []);
  const base = Math.floor(ids.length / n), rem = ids.length % n;
  let i = 0;
  for (let s = 0; s < n; s++) {
    const size = base + (s < rem ? 1 : 0);
    out[s] = ids.slice(i, i + size);
    i += size;
  }
  return out;
}

// shelfLayout 정합성 보정: 삭제된 책 제거 + 새 책 배치 (변경 시 저장)
function ensureShelfLayout() {
  if (!Array.isArray(shelfLayout) || shelfLayout.length !== SHELF_COUNT) {
    shelfLayout = Array.from({ length: SHELF_COUNT }, () => []);
  }
  let changed = false;
  const existing = new Set(books.map(b => b.id));
  for (let s = 0; s < SHELF_COUNT; s++) {
    const filtered = shelfLayout[s].filter(id => existing.has(id));
    if (filtered.length !== shelfLayout[s].length) { shelfLayout[s] = filtered; changed = true; }
  }
  const placed = new Set(shelfLayout.flat());
  for (const b of books) {
    if (!placed.has(b.id)) {
      let s = 0;                              // 가장 적은 선반에 배치
      for (let i = 1; i < SHELF_COUNT; i++) if (shelfLayout[i].length < shelfLayout[s].length) s = i;
      shelfLayout[s].push(b.id);
      changed = true;
    }
  }
  if (changed) persistLayout();
}

async function persistLayout() {
  try { await idbPut('meta', { key: 'shelfLayout', shelves: shelfLayout }); }
  catch (err) { console.error('선반 배치 저장 실패:', err); }
}

function clearDropMarks() {
  document.querySelectorAll('.book.insert-left, .book.insert-right')
    .forEach(b => b.classList.remove('insert-left', 'insert-right'));
  document.querySelectorAll('.shelf-books-row.drop-target')
    .forEach(r => r.classList.remove('drop-target'));
}

// 드래그한 책을 지정 선반으로 이동 (beforeId 없으면 그 선반 끝에 추가)
function moveBookTo(srcId, shelfIdx, beforeId, after) {
  for (const arr of shelfLayout) {
    const i = arr.indexOf(srcId);
    if (i !== -1) { arr.splice(i, 1); break; }
  }
  const target = shelfLayout[shelfIdx];
  if (beforeId == null) {
    target.push(srcId);
  } else {
    let idx = target.indexOf(beforeId);
    if (idx === -1) target.push(srcId);
    else { if (after) idx += 1; target.splice(idx, 0, srcId); }
  }
  renderBookshelf();
  persistLayout();
}

// 책 el 생성 (색·높이는 책 id에 고정 / 드래그는 소속 선반 shelfIdx 인지)
function makeBookEl(book, shelfIdx) {
  const bg     = PALETTES[book.id % PALETTES.length];
  const height = BOOK_HEIGHTS[book.id % BOOK_HEIGHTS.length];
  const title  = book.name.replace(/\.pdf$/i, '');
  const prog   = progressMap[book.id];
  const pct    = (prog && prog.total > 1) ? Math.min(100, Math.round(prog.page / prog.total * 100)) : 0;

  const el = document.createElement('div');
  el.className   = 'book';
  el.dataset.bid = book.id;
  el.style.height = height + 'px';
  el.innerHTML = `
    <div class="book-spine" style="background:${bg};">
      <span class="book-title-vert">${escHtml(title)}</span>
      <div class="book-band"></div>
      <div class="book-progress"><div class="book-progress-fill" style="width:${pct}%"></div></div>
    </div>
    <button class="book-del" title="이 책 삭제">✕</button>`;
  el.draggable = true;
  el.addEventListener('click', () => openBook(book, el));
  el.querySelector('.book-del').addEventListener('click', ev => {
    ev.stopPropagation();
    deleteBook(book);
  });
  el.addEventListener('dragstart', ev => {
    dragSrcId = book.id;
    ev.dataTransfer.effectAllowed = 'move';
    try { ev.dataTransfer.setData('text/plain', String(book.id)); } catch (_) {}
    el.classList.add('dragging');
  });
  el.addEventListener('dragover', ev => {
    ev.preventDefault();
    ev.dataTransfer.dropEffect = 'move';
    const rect  = el.getBoundingClientRect();
    const after = (ev.clientX - rect.left) > rect.width / 2;
    clearDropMarks();
    el.classList.toggle('insert-right',  after);
    el.classList.toggle('insert-left',  !after);
  });
  el.addEventListener('drop', ev => {
    ev.preventDefault();
    ev.stopPropagation();                     // 행(row) drop으로 전파 방지
    const after = el.classList.contains('insert-right');
    clearDropMarks();
    if (dragSrcId != null && dragSrcId !== book.id) moveBookTo(dragSrcId, shelfIdx, book.id, after);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    clearDropMarks();
    dragSrcId = null;
  });
  return el;
}

function renderBookshelf() {
  const wrap = document.getElementById('bookshelfWrap');
  document.getElementById('bookCountBadge').textContent = `책 ${books.length}권`;

  ensureShelfLayout();
  wrap.innerHTML = '';

  for (let s = 0; s < SHELF_COUNT; s++) {
    const unit = document.createElement('div');
    unit.className = 'shelf-unit';

    const lbl = document.createElement('div');
    lbl.className   = 'shelf-label';
    lbl.textContent = `Shelf ${s + 1}`;
    unit.appendChild(lbl);

    const row = document.createElement('div');
    row.className = 'shelf-books-row';
    row.dataset.shelf = s;

    // 책이 아닌 빈 공간에 드롭 → 그 선반 끝으로 이동
    row.addEventListener('dragover', ev => {
      ev.preventDefault();
      ev.dataTransfer.dropEffect = 'move';
      if (!ev.target.closest('.book')) { clearDropMarks(); row.classList.add('drop-target'); }
    });
    row.addEventListener('drop', ev => {
      ev.preventDefault();
      row.classList.remove('drop-target');
      if (!ev.target.closest('.book') && dragSrcId != null) moveBookTo(dragSrcId, s, null);
    });

    shelfLayout[s].forEach(id => {
      const book = bookById(id);
      if (book) row.appendChild(makeBookEl(book, s));
    });

    unit.appendChild(row);

    const plank = document.createElement('div');
    plank.className = 'shelf-plank';
    unit.appendChild(plank);

    const shadow = document.createElement('div');
    shadow.className = 'shelf-side-shadow';
    unit.appendChild(shadow);

    wrap.appendChild(unit);
  }

  if (!books.length) {
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.innerHTML = '서재가 비어 있습니다 — 우측 상단 <strong style="color:var(--gold)">폴더 추가</strong>로 PDF를 불러오세요';
    wrap.appendChild(hint);
  }
}

document.getElementById('folderInput').addEventListener('change', async e => {
  const files = Array.from(e.target.files)
    .filter(f => f.name.toLowerCase().endsWith('.pdf'));
  e.target.value = '';

  if (!files.length) { showToast('PDF 파일을 찾을 수 없습니다'); return; }
  showToast(`PDF ${files.length}개 처리 중...`);

  const existingNames = new Set(books.map(b => b.fileName));
  let added = 0;

  try {
    for (const file of files) {
      if (existingNames.has(file.name)) continue;
      const record = {
        name:      file.name,
        fileName:  file.name,
        blob:      file,        // File extends Blob — IDB stores it natively
        createdAt: Date.now(),
      };
      const id = await idbAdd('books', record);
      books.push({ ...record, id });
      added++;
    }
  } catch (err) {
    console.error('폴더 추가 실패:', err);
    renderBookshelf();
    showToast('⚠️ ' + (err.message || '저장 중 오류가 발생했습니다'));
    return;
  }

  renderBookshelf();
  showToast(added > 0
    ? `${added}권의 책이 추가되었습니다!`
    : '이미 모두 추가된 파일입니다');
});

/* =============================================================
   Delete Book (책 + 메모 + 대화 기록 일괄 삭제)
   ============================================================= */
async function deleteBook(book) {
  const title = book.name.replace(/\.pdf$/i, '');
  if (!confirm(`'${title}'을(를) 삭제할까요?\n\nPDF와 이 책의 메모·AI 대화 기록이 모두 삭제되며 되돌릴 수 없습니다.`)) return;
  try {
    const memos = await idbGetByIndex('memos', 'byBook', book.id);   // 메모 삭제
    for (const m of memos) await idbDelete('memos', m.id);
    await idbDelete('chats', book.id);                               // 대화 기록 삭제 (없으면 무시)
    await idbDelete('books', book.id);                               // 책(PDF) 삭제
    books = books.filter(b => b.id !== book.id);
    renderBookshelf();
    showToast(`'${title}' 삭제됨`);
  } catch (err) {
    console.error('책 삭제 실패:', err);
    showToast('⚠️ ' + (err.message || '삭제 중 오류가 발생했습니다'));
  }
}

/* =============================================================
   Open Book — GSAP Animation
   ============================================================= */
async function openBook(book, bookEl) {
  // Disable click during animation
  bookEl.style.pointerEvents = 'none';

  const rect = bookEl.getBoundingClientRect();
  const gi   = books.findIndex(b => b.id === book.id);
  const bg   = PALETTES[gi >= 0 ? gi % PALETTES.length : 0];

  // Target size: near full-screen centered
  const TW = Math.min(window.innerWidth  * 0.42, 440);   // 한 페이지 폭 (펼치면 2배)
  const TH = Math.min(window.innerHeight * 0.80, 660);
  const TX = window.innerWidth / 2;                       // 닫힌 책=오른쪽 페이지 → 펼치면 가운데 정렬
  const TY = (window.innerHeight - TH) / 2;

  // --- Phase 1: lift book ---
  await gsap.to(bookEl, {
    y: -18, duration: 0.15, ease: 'power2.out',
  });
  bookEl.style.opacity = '0';
  gsap.set(bookEl, { y: 0 });

  // --- Set up animBook at book's original position ---
  const animBook  = document.getElementById('animBook');
  const animCover = document.getElementById('animBookCover');
  document.getElementById('animBookTitle').textContent =
    book.name.replace(/\.pdf$/i, '');

  document.getElementById('animBookCoverFront').style.background = bg;
  gsap.set(animBook, {
    display: 'block',
    x: 0, y: 0,
    left: rect.left,
    top:  rect.top,
    width:  rect.width,
    height: rect.height,
    opacity: 1,
  });
  gsap.set(animCover, { rotationY: 0, transformOrigin: 'left center' });

  // --- Phase 2: fly to center and expand ---
  await gsap.to(animBook, {
    left:   TX,
    top:    TY,
    width:  TW,
    height: TH,
    duration: 0.65,
    ease: 'power3.inOut',
  });

  // --- Phase 3: flip cover open ---
  await gsap.timeline()
    .to(animCover, { rotationY: -90,  duration: 0.4, ease: 'power2.in' })
    .to(animCover, { rotationY: -180, duration: 0.4, ease: 'power2.out' });

  // 펼쳐진 흰색 2면을 잠깐 보여주는 여운
  await new Promise(r => setTimeout(r, 180));

  // --- Phase 4: fade out animBook, show workspace ---
  gsap.to(animBook, {
    opacity: 0, scale: 0.97, duration: 0.28,
    onComplete: () => {
      gsap.set(animBook, { display: 'none', scale: 1 });
    }
  });

  // Populate workspace
  currentBook = book;
  document.getElementById('wsTitle').textContent =
    book.name.replace(/\.pdf$/i, '');

  const overlay = document.getElementById('workspaceOverlay');
  overlay.style.display = 'flex';
  await gsap.fromTo(overlay, { opacity: 0 }, { opacity: 1, duration: 0.38 });

  // Load data in parallel
  loadPDF(book);
  loadMemos(book.id);
  chatDocText = null;     // reset cached document text for the new book
  switchPane('memo');     // start on the memo tab
  loadChat(book.id);      // restore saved chat history
}

/* =============================================================
   Close Book
   ============================================================= */
async function closeBook() {
  const overlay = document.getElementById('workspaceOverlay');
  await gsap.to(overlay, { opacity: 0, duration: 0.32 });
  overlay.style.display = 'none';

  // Restore original book element
  if (currentBook) {
    const el = document.querySelector(`.book[data-bid="${currentBook.id}"]`);
    if (el) {
      el.style.pointerEvents = '';
      el.style.opacity = '0';
      gsap.to(el, {
        opacity: 1, y: -10, duration: 0.01,
        onComplete: () => gsap.to(el, { y: 0, duration: 0.42, ease: 'back.out(2)' })
      });
    }
  }

  // Cleanup PDF
  if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
  rendering   = false;
  pendingPage = null;
  currentBook = null;
  currentPage = 1;
  totalPages  = 1;

  const canvas = document.getElementById('pdfCanvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  canvas.style.display = 'none';

  const msg = document.getElementById('pdfMsg');
  msg.style.display  = 'flex';
  msg.textContent    = '책을 열면 PDF가 표시됩니다';

  document.getElementById('prevPageBtn').disabled     = true;
  document.getElementById('nextPageBtn').disabled     = true;
  document.getElementById('pageInfo').textContent     = '— / —';
  zoomFactor = 1;
  document.getElementById('zoomInfo').textContent     = '100%';
  document.getElementById('zoomOutBtn').disabled      = true;
  document.getElementById('zoomInBtn').disabled       = true;
  document.getElementById('zoomFitBtn').disabled      = true;
  document.getElementById('memoTextarea').value       = '';
  document.getElementById('memoList').innerHTML       = '';
  document.getElementById('memoPageTag').textContent  = '[p.1] 현재 페이지';
  closeSummaryBox();
  chatMessages = [];
  chatDocText  = null;
  document.getElementById('chatMessages').innerHTML = '';
  switchPane('memo');
}

/* =============================================================
   PDF Loading & Rendering
   ============================================================= */
async function loadPDF(book) {
  const msg    = document.getElementById('pdfMsg');
  const canvas = document.getElementById('pdfCanvas');

  msg.textContent   = 'PDF 불러오는 중...';
  msg.style.display = 'flex';
  canvas.style.display = 'none';

  try {
    // Always re-fetch from DB so we get a fresh Blob handle
    const record = await idbGet('books', book.id);
    const buffer = await record.blob.arrayBuffer();

    pdfDoc     = await pdfjsLib.getDocument({
      data: buffer,
      // 한글(CJK) PDF는 유니코드 텍스트 추출에 CMap이 필요함 (렌더링은 영향 없음)
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
      cMapPacked: true,
    }).promise;
    totalPages = pdfDoc.numPages;
    const saved = progressMap[book.id];
    currentPage = (openToPage && openToPage >= 1 && openToPage <= totalPages) ? openToPage
                : (saved && saved.page >= 1 && saved.page <= totalPages)      ? saved.page
                : 1;
    openToPage = null;
    setProgress(book.id, currentPage, totalPages);

    msg.style.display    = 'none';
    canvas.style.display = 'block';
    await renderPage(currentPage);
  } catch (err) {
    msg.textContent = `PDF 로드 실패: ${err.message}`;
    console.error(err);
  }
}

async function renderPage(num) {
  if (!pdfDoc) return;
  if (rendering) { pendingPage = num; return; }

  rendering = true;
  const canvas = document.getElementById('pdfCanvas');

  try {
    const page = await pdfDoc.getPage(num);
    const wrap = document.getElementById('pdfCanvasWrap');
    const availW = wrap.clientWidth - 48;
    if (availW <= 0) return;   // 워크스페이스가 숨겨져 폭이 0이면 렌더 스킵

    const baseVP   = page.getViewport({ scale: 1 });
    const fitScale = availW / baseVP.width;
    const scale    = fitScale * zoomFactor;
    const vp       = page.getViewport({ scale });

    canvas.width  = vp.width;
    canvas.height = vp.height;

    await page.render({
      canvasContext: canvas.getContext('2d'),
      viewport: vp,
    }).promise;

    currentPage = num;
    syncControls();
  } catch (err) {
    if (!err || err.name !== 'RenderingCancelledException') console.error('Render error:', err);
  } finally {
    rendering = false;
    if (pendingPage !== null) {
      const p = pendingPage;
      pendingPage = null;
      renderPage(p);
    }
  }
}

function syncControls() {
  document.getElementById('pageInfo').textContent     = `${currentPage} / ${totalPages}`;
  document.getElementById('prevPageBtn').disabled     = currentPage <= 1;
  document.getElementById('nextPageBtn').disabled     = currentPage >= totalPages;
  document.getElementById('memoPageTag').textContent  = `[p.${currentPage}] 현재 페이지`;
  document.getElementById('zoomInfo').textContent     = Math.round(zoomFactor * 100) + '%';
  document.getElementById('zoomOutBtn').disabled      = zoomFactor <= ZOOM_MIN + 0.001;
  document.getElementById('zoomInBtn').disabled       = zoomFactor >= ZOOM_MAX - 0.001;
  document.getElementById('zoomFitBtn').disabled      = false;
  if (currentBook) setProgress(currentBook.id, currentPage, totalPages);   // 이어 읽기 진행률 기록
}

function changePage(delta) {
  const next = currentPage + delta;
  if (next < 1 || next > totalPages) return;
  renderPage(next);
}

document.getElementById('prevPageBtn').addEventListener('click', () => changePage(-1));
document.getElementById('nextPageBtn').addEventListener('click', () => changePage(1));

/* 스크롤로 페이지 넘김: 페이지 안에서 스크롤할 여지가 있으면 일반 스크롤,
   맨 위/아래 가장자리에서 더 스크롤하면 이전/다음 페이지로 이동 */
let _wheelLock = false;
document.getElementById('pdfCanvasWrap').addEventListener('wheel', e => {
  if (!pdfDoc) return;
  const wrap     = e.currentTarget;
  const down     = e.deltaY > 0;
  const atTop    = wrap.scrollTop <= 0;
  const atBottom = wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight - 1;
  if ((down && !atBottom) || (!down && !atTop)) return;                              // 페이지 내부 스크롤
  if ((down && currentPage >= totalPages) || (!down && currentPage <= 1)) return;    // 문서 끝
  if (_wheelLock) return;                                                            // 연속 넘김 방지
  e.preventDefault();
  _wheelLock = true;
  renderPage(currentPage + (down ? 1 : -1));
  wrap.scrollTop = 0;
  setTimeout(() => { _wheelLock = false; }, 320);
}, { passive: false });

function setZoom(factor) {
  const nf = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round(factor * 100) / 100));
  if (Math.abs(nf - zoomFactor) < 0.001) { syncControls(); return; }
  zoomFactor = nf;
  if (pdfDoc) renderPage(currentPage); else syncControls();
}
document.getElementById('zoomInBtn').addEventListener('click',  () => setZoom(zoomFactor + ZOOM_STEP));
document.getElementById('zoomOutBtn').addEventListener('click', () => setZoom(zoomFactor - ZOOM_STEP));
document.getElementById('zoomFitBtn').addEventListener('click', () => setZoom(1));

/* =============================================================
   AI Summary (server proxy → /api/summarize, Groq)
   ============================================================= */
let lastSummary = null;   // { page, text } of the most recent successful summary

// Extract selectable text from a given PDF page via PDF.js
async function extractPageText(pageNum) {
  const page = await pdfDoc.getPage(pageNum);
  const tc   = await page.getTextContent();
  return tc.items.map(it => it.str).join(' ').replace(/\s+/g, ' ').trim();
}

// Gather text across the whole document (capped) for the "전체" summary
const SUMMARY_TEXT_CAP = 12000;
async function gatherDocText() {
  const parts = [];
  let total = 0;
  for (let p = 1; p <= totalPages; p++) {
    const t = await extractPageText(p);
    if (t) { parts.push(t); total += t.length + 1; }
    if (total >= SUMMARY_TEXT_CAP) break;
  }
  return parts.join('\n').slice(0, SUMMARY_TEXT_CAP).trim();
}

// Call the server summary endpoint; throw coded errors for friendly messages
async function requestSummary(content, title) {
  let resp;
  try {
    resp = await fetch('/api/summarize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, fileTitle: title, fileExt: 'pdf' })
    });
  } catch (e) {
    throw new Error('NETWORK');
  }
  let data = null;
  try { data = await resp.json(); } catch (e) { data = null; }
  if (!resp.ok) {
    if (resp.status === 503) throw new Error('NOKEY');
    if (resp.status === 404 || resp.status === 405) throw new Error('NOSERVER');
    throw new Error((data && data.error) ? data.error : ('HTTP ' + resp.status));
  }
  if (!data || !data.result) throw new Error('서버 응답이 비어 있습니다');
  return data.result;
}

const SUMMARY_ERRORS = {
  NOTEXT:   '이 PDF에서 추출할 수 있는 텍스트가 거의 없습니다.\n스캔본이거나 텍스트가 이미지로 들어간 PDF는 요약할 수 없어요.',
  NOTEXT_PAGE: '이 페이지에는 추출할 텍스트가 거의 없습니다.\n표지·그림 위주 페이지일 수 있어요. [📚 전체 AI 요약]을 사용해보세요.',
  NETWORK:  'AI 요약 서버에 연결할 수 없습니다.\nserver.js 실행 후( npm start ) http://localhost:3000 에서 열어주세요.',
  NOSERVER: 'AI 요약 API(/api/summarize)를 찾을 수 없습니다.\n정적 서버 대신 server.js로 실행해야 합니다 ( npm start, 포트 3000 ).',
  NOKEY:    '서버에 GROQ_API_KEY가 설정되지 않았습니다.\n.env 에 키를 넣고 server.js를 다시 시작해주세요.'
};

async function doAISummary(mode) {   // mode: 'page' | 'doc'
  if (!pdfDoc || !currentBook) return;

  const pageBtn  = document.getElementById('aiSummaryPageBtn');
  const docBtn   = document.getElementById('aiSummaryDocBtn');
  const box      = document.getElementById('aiSummaryBox');
  const badge    = document.getElementById('aiSummaryBadge');
  const contentEl= document.getElementById('aiSummaryContent');
  const saveBtn  = document.getElementById('aiSummarySaveBtn');
  const page     = currentPage;
  const clicked  = mode === 'doc' ? docBtn : pageBtn;
  const original = clicked.textContent;

  pageBtn.disabled = true;
  docBtn.disabled  = true;
  clicked.textContent = '⏳…';
  box.style.display = 'block';
  box.classList.remove('error');
  saveBtn.style.display = 'none';
  badge.textContent = mode === 'doc' ? '🤖 문서 전체 요약 중' : `🤖 p.${page} 요약 중`;
  contentEl.innerHTML = `<span class="ai-sum-loading">AI가 ${mode === 'doc' ? '문서 전체' : ('p.' + page + ' 페이지')}를 분석하고 있습니다…</span>`;

  try {
    let text;
    if (mode === 'doc') {
      text = await gatherDocText();
      if (text.length < 20) throw new Error('NOTEXT');
    } else {
      text = await extractPageText(page);
      if (text.length < 20) throw new Error('NOTEXT_PAGE');
    }

    const result = await requestSummary(text, currentBook.name.replace(/\.pdf$/i, ''));
    lastSummary = { page, text: result, scope: mode };
    badge.textContent     = mode === 'doc' ? '🤖 문서 전체 AI 요약' : `🤖 p.${page} AI 요약`;
    contentEl.textContent = result;
    saveBtn.style.display = '';
  } catch (err) {
    box.classList.add('error');
    badge.textContent     = '⚠️ 요약 실패';
    saveBtn.style.display  = 'none';
    lastSummary = null;
    contentEl.textContent = SUMMARY_ERRORS[err.message] || ('오류: ' + err.message);
  } finally {
    pageBtn.disabled = false;
    docBtn.disabled  = false;
    clicked.textContent = original;
  }
}

async function saveSummaryAsMemo() {
  if (!lastSummary || !currentBook) return;
  await idbAdd('memos', {
    bookId:    currentBook.id,
    page:      lastSummary.page,
    content:   (lastSummary.scope === 'doc' ? '🤖 AI 요약 (문서 전체)\n' : '🤖 AI 요약\n') + lastSummary.text,
    createdAt: Date.now()
  });
  showToast('AI 요약을 메모로 저장했습니다');
  loadMemos(currentBook.id);
}

function closeSummaryBox() {
  const box = document.getElementById('aiSummaryBox');

  document.getElementById('aiSummaryContent').textContent = '';
  document.getElementById('aiSummarySaveBtn').style.display = 'none';

}

document.getElementById('aiSummaryPageBtn').addEventListener('click', () => doAISummary('page'));

document.getElementById('aiSummaryCloseBtn').addEventListener('click', closeSummaryBox);

/* =============================================================
   Chatbot (document-grounded, server proxy → /api/chat, Groq)
   ============================================================= */
let chatMessages = [];     // [{ role:'user'|'assistant', content, error? }]
let chatDocText  = null;   // cached full-document text for the current book
let chatBusy     = false;

function switchPane(pane) {
  const memo = pane !== 'chat';
  document.getElementById('memoPane').hidden = !memo;
  document.getElementById('chatPane').hidden =  memo;
  document.getElementById('tabMemoBtn').classList.toggle('active',  memo);
  document.getElementById('tabChatBtn').classList.toggle('active', !memo);
  if (!memo) setTimeout(() => document.getElementById('chatInput').focus(), 40);
}

function renderChat() {
  const box = document.getElementById('chatMessages');
  if (!chatMessages.length) {
    box.innerHTML = '<div class="chat-empty">💬 이 문서에 대해 무엇이든 물어보세요<br><span>예: "핵심 내용 3가지는?" · "p.5 내용 설명해줘"</span></div>';
    return;
  }
  box.innerHTML = chatMessages.map(m =>
    `<div class="chat-msg ${m.role === 'user' ? 'user' : 'bot'}${m.error ? ' error' : ''}">${escHtml(m.content)}</div>`
  ).join('');
  box.scrollTop = box.scrollHeight;
}

async function loadChat(bookId) {
  try {
    const rec = await idbGet('chats', bookId);
    chatMessages = (rec && Array.isArray(rec.messages)) ? rec.messages : [];
  } catch (e) { chatMessages = []; }
  renderChat();
}

async function saveChat() {
  if (!currentBook) return;
  try { await idbPut('chats', { bookId: currentBook.id, messages: chatMessages }); } catch (e) {}
}

async function getChatDocText() {
  if (chatDocText === null) chatDocText = await gatherDocText();
  return chatDocText;
}

async function sendChat() {
  if (chatBusy || !pdfDoc || !currentBook) return;
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q) return;

  chatBusy = true;
  const sendBtn = document.getElementById('chatSendBtn');
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  chatMessages.push({ role: 'user', content: q });
  renderChat();

  const box = document.getElementById('chatMessages');
  const typing = document.createElement('div');
  typing.className = 'chat-msg bot typing';
  typing.textContent = '답변을 작성하는 중…';
  box.appendChild(typing);
  box.scrollTop = box.scrollHeight;

  try {
    const docText = await getChatDocText();
    if (!docText || docText.length < 20) {
      throw new Error('이 문서에서 추출할 텍스트가 거의 없어 답변할 수 없습니다. (스캔본·이미지 PDF)');
    }

    let resp;
    try {
      resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          docText,
          docTitle: currentBook.name.replace(/\.pdf$/i, ''),
          history:  chatMessages.slice(-12)
        })
      });
    } catch (e) {
      throw new Error('AI 챗 서버에 연결할 수 없습니다.\nserver.js 실행 후( npm start ) http://localhost:3000 에서 열어주세요.');
    }

    let data = null;
    try { data = await resp.json(); } catch (e) {}
    if (!resp.ok) {
      if (resp.status === 503) throw new Error('서버에 GROQ_API_KEY가 설정되지 않았습니다. (.env 확인)');
      if (resp.status === 404 || resp.status === 405) throw new Error('AI 챗 API(/api/chat)를 찾을 수 없습니다.\n정적 서버 대신 server.js로 실행해야 합니다 (npm start, 3000).');
      throw new Error((data && data.error) ? data.error : ('HTTP ' + resp.status));
    }
    const reply = (data && data.reply) ? data.reply : '응답을 받지 못했습니다.';
    chatMessages.push({ role: 'assistant', content: reply });
  } catch (err) {
    chatMessages.push({ role: 'assistant', content: '⚠️ ' + (err.message || '오류'), error: true });
  } finally {
    typing.remove();
    renderChat();
    await saveChat();
    chatBusy = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

document.getElementById('tabMemoBtn').addEventListener('click', () => switchPane('memo'));
document.getElementById('tabChatBtn').addEventListener('click', () => switchPane('chat'));
document.getElementById('chatSendBtn').addEventListener('click', sendChat);
document.getElementById('chatInput').addEventListener('keydown', e => {

/* =============================================================
   Utilities
   ============================================================= */
function escHtml(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} `
       + `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* =============================================================
   이어 읽기 / 진행률 저장
   ============================================================= */
let _progTimer;
function setProgress(bookId, page, total) {
  const prev = progressMap[bookId];
  if (prev && prev.page === page && prev.total === total) return;
  progressMap[bookId] = { page, total };
  updateSpineProgress(bookId);
  clearTimeout(_progTimer);
  _progTimer = setTimeout(() => { idbPut('meta', { key: 'progress', map: progressMap }).catch(() => {}); }, 400);
}
function updateSpineProgress(bookId) {
  const fill = document.querySelector('.book[data-bid="' + bookId + '"] .book-progress-fill');
  if (!fill) return;
  const p = progressMap[bookId];
  fill.style.width = (p && p.total > 1 ? Math.min(100, Math.round(p.page / p.total * 100)) : 0) + '%';
}

/* =============================================================
   백업 / 복원 (전체 라이브러리 → JSON 파일)
   ============================================================= */
function abToB64(buf) {
  const bytes = new Uint8Array(buf); let bin = ''; const CH = 0x8000;
  for (let i = 0; i < bytes.length; i += CH) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CH));
  return btoa(bin);
}
function b64ToAb(b64) {
  const bin = atob(b64); const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
async function exportLibrary() {
  try {
    showToast('백업 만드는 중…');
    const [booksArr, memosArr, chatsArr, metaArr] = await Promise.all([
      idbGetAll('books'), idbGetAll('memos'), idbGetAll('chats'), idbGetAll('meta')
    ]);
    const booksOut = [];
    for (const b of booksArr) {
      const buf = await b.blob.arrayBuffer();
      booksOut.push({ id: b.id, name: b.name, fileName: b.fileName, createdAt: b.createdAt,
                      blobType: (b.blob.type || 'application/pdf'), blobB64: abToB64(buf) });
    }
    const data = { app: 'virtual-library', version: 1, exportedAt: Date.now(),
                   books: booksOut, memos: memosArr, chats: chatsArr, meta: metaArr };
    const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'virtual-library-backup-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('백업 완료 — 책 ' + booksOut.length + '권 내보냄');
  } catch (err) { console.error('백업 실패:', err); showToast('⚠️ 백업 실패: ' + (err.message || '')); }
}
async function importLibrary(file) {
  if (!file) return;
  if (!confirm('백업을 불러오면 현재 라이브러리(책·메모·대화·배치)를 모두 대체합니다.\n계속할까요?')) return;
  try {
    showToast('복원 중…');
    const data = JSON.parse(await file.text());
    if (!data || data.app !== 'virtual-library' || !Array.isArray(data.books)) {
      showToast('⚠️ 올바른 백업 파일이 아닙니다'); return;
    }
    for (const s of ['books', 'memos', 'chats', 'meta']) await idbClear(s);
    for (const b of data.books) {
      const blob = new Blob([b64ToAb(b.blobB64)], { type: b.blobType || 'application/pdf' });
      await idbPut('books', { id: b.id, name: b.name, fileName: b.fileName, createdAt: b.createdAt, blob });
    }
    for (const m of (data.memos || [])) await idbPut('memos', m);
    for (const c of (data.chats || [])) await idbPut('chats', c);
    for (const mt of (data.meta || [])) await idbPut('meta', mt);
    showToast('복원 완료 — 새로고침합니다');
    setTimeout(() => location.reload(), 900);
  } catch (err) { console.error('복원 실패:', err); showToast('⚠️ 복원 실패: ' + (err.message || '')); }
}

/* =============================================================
   전체 검색 (제목 · 본문 · 메모) — 본문은 백그라운드 색인
   ============================================================= */
async function buildFulltextIndex() {
  if (_indexing) return;
  _indexing = true; updateIndexStatus();
  let changed = false;
  for (const b of books) {
    if (fulltextMap[b.id] != null) continue;
    try {
      const rec = await idbGet('books', b.id);
      const buf = await rec.blob.arrayBuffer();
      const doc = await pdfjsLib.getDocument({ data: buf,
        cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/', cMapPacked: true }).promise;
      let txt = '';
      for (let p = 1; p <= doc.numPages && txt.length < 20000; p++) {
        const tc = await (await doc.getPage(p)).getTextContent();
        txt += tc.items.map(i => i.str).join(' ') + ' ';
      }
      doc.destroy();
      fulltextMap[b.id] = txt.replace(/\s+/g, ' ').trim();
      changed = true; updateIndexStatus();
    } catch (e) { fulltextMap[b.id] = ''; }
    await new Promise(r => setTimeout(r, 40));
  }
  if (changed) idbPut('meta', { key: 'fulltext', map: fulltextMap }).catch(() => {});
  _indexing = false; updateIndexStatus();
  const si = document.getElementById('librarySearch');
  if (si && si.value.trim()) searchLibrary(si.value);
}
function updateIndexStatus() {
  const el = document.getElementById('searchIndexStatus');
  if (!el) return;
  const done = books.filter(b => fulltextMap[b.id] != null).length;
  el.textContent = _indexing ? '· 본문 색인 중… (' + done + '/' + books.length + ')' : '';
}

let _allMemos = null;
async function searchLibrary(query) {
  const q = (query || '').trim().toLowerCase();
  if (!q) { _allMemos = null; renderBookshelf(); return; }
  if (Object.keys(fulltextMap).length < books.length) buildFulltextIndex();
  if (_allMemos === null) { try { _allMemos = await idbGetAll('memos'); } catch (e) { _allMemos = []; } }

  const memosByBook = {};
  for (const m of _allMemos) (memosByBook[m.bookId] = memosByBook[m.bookId] || []).push(m);

  const results = [];
  for (const b of books) {
    const title = b.name.replace(/\.pdf$/i, '');
    const tags = []; let snippet = ''; let memoPage = null;
    if (title.toLowerCase().includes(q)) tags.push({ t: '제목' });
    const body = fulltextMap[b.id];
    if (body && body.toLowerCase().includes(q)) {
      tags.push({ t: '본문' });
      const i = body.toLowerCase().indexOf(q);
      snippet = body.slice(Math.max(0, i - 32), i + q.length + 50);
    }
    const mm = (memosByBook[b.id] || []).find(m => (m.content || '').toLowerCase().includes(q));
    if (mm) {
      tags.push({ t: '메모', memo: true }); memoPage = mm.page;
      if (!snippet) { const i = mm.content.toLowerCase().indexOf(q); snippet = mm.content.slice(Math.max(0, i - 32), i + q.length + 50); }
    }
    if (tags.length) results.push({ book: b, title, tags, snippet, memoPage });
  }
  renderSearchResults(q, results);
}
function hlText(text, q) {
  const idx = text.toLowerCase().indexOf(q);
  if (idx < 0) return escHtml(text);
  return escHtml(text.slice(0, idx)) + '<mark>' + escHtml(text.slice(idx, idx + q.length)) + '</mark>' + escHtml(text.slice(idx + q.length));
}
function renderSearchResults(q, results) {
  const wrap = document.getElementById('bookshelfWrap');
  let html = '<div class="search-results"><div class="search-info">🔍 "' + escHtml(q) + '" — ' + results.length + '권 일치 <span id="searchIndexStatus"></span></div>';
  if (!results.length) {
    html += '<div class="empty-hint">일치하는 책이 없습니다</div>';
  } else {
    for (const r of results) {
      const tags = r.tags.map(t => '<span class="search-tag ' + (t.memo ? 'memo' : '') + '">' + t.t + (t.memo && r.memoPage ? ' p.' + r.memoPage : '') + '</span>').join('');
      html += '<div class="search-item" data-bid="' + r.book.id + '" data-page="' + (r.memoPage || '') + '">'
            + '<div style="flex:1; min-width:0;">'
            + '<div class="search-item-title">📕 ' + escHtml(r.title) + '</div>'
            + '<div class="search-item-tags">' + tags + '</div>'
            + (r.snippet ? '<div class="search-snippet">…' + hlText(r.snippet, q) + '…</div>' : '')
            + '</div></div>';
    }
  }
  html += '</div>';
  wrap.innerHTML = html;
  updateIndexStatus();
  wrap.querySelectorAll('.search-item').forEach(item => {
    item.addEventListener('click', () => {
      const bid  = Number(item.dataset.bid);
      const book = books.find(b => b.id === bid);
      if (!book) return;
      const pg = item.dataset.page ? Number(item.dataset.page) : null;
      if (pg) openToPage = pg;
      document.getElementById('librarySearch').value = '';
      renderBookshelf();
      const el = document.querySelector('.book[data-bid="' + bid + '"]');
      openBook(book, el || item);
    });
  });
}

/* 검색 / 백업 / 복원 이벤트 */
(() => {
  const si = document.getElementById('librarySearch');
  let t;
  si.addEventListener('input', () => { clearTimeout(t); t = setTimeout(() => searchLibrary(si.value), 220); });
  si.addEventListener('keydown', e => { if (e.key === 'Escape') { si.value = ''; searchLibrary(''); } });
  document.getElementById('backupBtn').addEventListener('click', exportLibrary);
  document.getElementById('restoreBtn').addEventListener('click', () => document.getElementById('restoreInput').click());
  document.getElementById('restoreInput').addEventListener('change', e => { importLibrary(e.target.files[0]); e.target.value = ''; });
})();

/* =============================================================
   읽기 모드 (보통 / 세피아 / 야간 반전)
   ============================================================= */
const READ_MODES  = ['normal', 'sepia', 'night'];
const READ_LABELS = { normal: '☀️ 보통', sepia: '📜 세피아', night: '🌙 야간' };
let readMode = localStorage.getItem('readMode') || 'normal';
function applyReadMode(mode) {
  readMode = READ_MODES.includes(mode) ? mode : 'normal';
  const wrap = document.getElementById('pdfCanvasWrap');
  if (wrap) { wrap.classList.remove('mode-sepia', 'mode-night'); if (readMode !== 'normal') wrap.classList.add('mode-' + readMode); }
  const btn = document.getElementById('readModeBtn');
  if (btn) btn.textContent = READ_LABELS[readMode];
  try { localStorage.setItem('readMode', readMode); } catch (e) {}
}
document.getElementById('readModeBtn').addEventListener('click', () => {
  applyReadMode(READ_MODES[(READ_MODES.indexOf(readMode) + 1) % READ_MODES.length]);
});
applyReadMode(readMode);

/* =============================================================
   앰비언트 사운드 (Web Audio 합성 — 외부 파일 없음)
   ============================================================= */
const Ambient = {
  ctx: null, master: null, current: null, nodes: [], timers: [],
  vol: (parseInt(localStorage.getItem('ambVol') || '50', 10) / 100),
  ensure() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.vol;
      this.master.connect(this.ctx.destination);
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },
  noiseBuf(seconds, brown) {
    const len = Math.floor(this.ctx.sampleRate * seconds);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    if (brown) { let last = 0; for (let i = 0; i < len; i++) { const w = Math.random() * 2 - 1; last = (last + 0.02 * w) / 1.02; d[i] = last * 3.2; } }
    else { for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1; }
    return buf;
  },
  loopSrc(brown) { const s = this.ctx.createBufferSource(); s.buffer = this.noiseBuf(4, brown); s.loop = true; s.start(); this.nodes.push(s); return s; },
  stop() {
    this.timers.forEach(t => clearTimeout(t));
    this.nodes.forEach(n => { try { if (n.stop) n.stop(); } catch (e) {} try { n.disconnect(); } catch (e) {} });
    this.nodes = []; this.timers = []; this.current = null;
    this.updateUI();
  },
  play(snd) {
    this.ensure();
    this.stop();
    this.current = snd;                     // crackle 가드가 'fire'를 인식하도록 먼저 설정
    const ctx = this.ctx, out = this.master;
    if (snd === 'rain') {
      const s = this.loopSrc(false);
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 900;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';  lp.frequency.value = 8000;
      const g  = ctx.createGain(); g.gain.value = 0.5;
      s.connect(hp); hp.connect(lp); lp.connect(g); g.connect(out);
      this.nodes.push(hp, lp, g);
    } else if (snd === 'ocean') {
      const s = this.loopSrc(true);
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 500;
      const g  = ctx.createGain(); g.gain.value = 0.4;
      const lfo = ctx.createOscillator(); lfo.frequency.value = 0.09;
      const lfoG = ctx.createGain(); lfoG.gain.value = 0.3;
      lfo.connect(lfoG); lfoG.connect(g.gain); lfo.start();
      s.connect(lp); lp.connect(g); g.connect(out);
      this.nodes.push(lp, g, lfo, lfoG);
    } else if (snd === 'wind') {
      const s = this.loopSrc(false);
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.7;
      const g  = ctx.createGain(); g.gain.value = 0.55;
      const lfo = ctx.createOscillator(); lfo.frequency.value = 0.13;
      const lfoG = ctx.createGain(); lfoG.gain.value = 350;
      lfo.connect(lfoG); lfoG.connect(bp.frequency); lfo.start();
      s.connect(bp); bp.connect(g); g.connect(out);
      this.nodes.push(bp, g, lfo, lfoG);
    } else if (snd === 'fire') {
      const s = this.loopSrc(true);
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 700;
      const g  = ctx.createGain(); g.gain.value = 0.4;
      s.connect(lp); lp.connect(g); g.connect(out);
      this.nodes.push(lp, g);
      const crackBuf = this.noiseBuf(0.12, false);   // 짧은 버퍼 재사용
      const crackle = () => {
        if (this.current !== 'fire' || !this.ctx) return;
        const b = ctx.createBufferSource(); b.buffer = crackBuf;
        const cf = ctx.createBiquadFilter(); cf.type = 'bandpass'; cf.frequency.value = 1400 + Math.random() * 1600;
        const cg = ctx.createGain(); const t = ctx.currentTime;
        cg.gain.setValueAtTime(0.0001, t);
        cg.gain.linearRampToValueAtTime(0.4 + Math.random() * 0.5, t + 0.005);
        cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
        b.connect(cf); cf.connect(cg); cg.connect(out); b.start(t); b.stop(t + 0.09);
        this.timers.push(setTimeout(crackle, 50 + Math.random() * 260));
      };
      crackle();
    }
    this.updateUI();
  },
  setVol(v) { this.vol = v; if (this.master) this.master.gain.value = v; try { localStorage.setItem('ambVol', Math.round(v * 100)); } catch (e) {} },
  updateUI() {
    document.querySelectorAll('.amb-sound').forEach(b => b.classList.toggle('on', b.dataset.snd === this.current));
    const tg = document.getElementById('ambientToggle');
    if (tg) tg.classList.toggle('playing', !!this.current);
  }
};
(() => {
  document.getElementById('ambientToggle').addEventListener('click', () => {
    document.getElementById('ambientPanel').classList.toggle('hidden');
  });
  document.querySelectorAll('.amb-sound').forEach(b => {
    b.addEventListener('click', () => { Ambient.current === b.dataset.snd ? Ambient.stop() : Ambient.play(b.dataset.snd); });
  });
  document.getElementById('ambStop').addEventListener('click', () => Ambient.stop());
  const vol = document.getElementById('ambVol');
  vol.value = Math.round(Ambient.vol * 100);
  vol.addEventListener('input', () => Ambient.setVol(vol.value / 100));
})();

/* =============================================================
   독서 통계
   ============================================================= */
async function openStats() {
  let completed = 0, reading = 0, pagesRead = 0, pagesTotal = 0;
  for (const b of books) {
    const p = progressMap[b.id];
    if (p && p.total > 1) {
      pagesTotal += p.total;
      pagesRead  += Math.min(p.page, p.total);
      if (p.page >= p.total) completed++;
      else if (p.page > 1)   reading++;
    }
  }
  const total = books.length;
  const notStarted = Math.max(0, total - completed - reading);
  let memos = [], chats = [];
  try { memos = await idbGetAll('memos'); } catch (e) {}
  try { chats = await idbGetAll('chats'); } catch (e) {}
  const chatMsgs = chats.reduce((s, c) => s + (Array.isArray(c.messages) ? c.messages.length : 0), 0);
  const overallPct = pagesTotal > 0 ? Math.round(pagesRead / pagesTotal * 100) : 0;
  const progList = books.map(b => ({ b, p: progressMap[b.id] }))
    .filter(x => x.p && x.p.total > 1 && x.p.page > 1)
    .map(x => ({ title: x.b.name.replace(/\.pdf$/i, ''), pct: Math.min(100, Math.round(x.p.page / x.p.total * 100)) }))
    .sort((a, b) => b.pct - a.pct).slice(0, 8);

  renderStats({ total, completed, reading, notStarted, memos: memos.length, chatMsgs, overallPct, progList });
  document.getElementById('statsModal').classList.remove('hidden');
}
function renderStats(s) {
  document.getElementById('statsGrid').innerHTML = [
    ['📚', s.total, '전체 책'], ['✅', s.completed, '완독'], ['📖', s.reading, '읽는 중'],
    ['✍️', s.memos, '메모'], ['💬', s.chatMsgs, 'AI 대화'], ['📈', s.overallPct + '%', '전체 진행률']
  ].map(([i, n, l]) => '<div class="stat-card"><div class="stat-num">' + n + '</div><div class="stat-label">' + i + ' ' + l + '</div></div>').join('');

  const t = Math.max(1, s.total);
  document.getElementById('statsBar').innerHTML =
    '<div class="bar-seg done" style="width:' + (s.completed / t * 100) + '%"></div>' +
    '<div class="bar-seg reading" style="width:' + (s.reading / t * 100) + '%"></div>' +
    '<div class="bar-seg none" style="width:' + (s.notStarted / t * 100) + '%"></div>';
  document.getElementById('statsLegend').innerHTML =
    '<span><i style="background:#6aaa6a"></i>완독 ' + s.completed + '</span>' +
    '<span><i style="background:var(--gold)"></i>읽는 중 ' + s.reading + '</span>' +
    '<span><i style="background:rgba(255,255,255,0.15)"></i>미시작 ' + s.notStarted + '</span>';

  const list = document.getElementById('statsTopList');
  list.innerHTML = s.progList.length
    ? s.progList.map(x => '<div class="stats-row"><div class="stats-row-name" title="' + escHtml(x.title) + '">' + escHtml(x.title) + '</div><div class="stats-row-bar"><div class="stats-row-fill" style="width:' + x.pct + '%"></div></div><div class="stats-row-pct">' + x.pct + '%</div></div>').join('')
    : '<div class="empty-hint">아직 읽기 시작한 책이 없습니다</div>';
}
(() => {
  const modal = document.getElementById('statsModal');
  document.getElementById('statsBtn').addEventListener('click', openStats);
  document.getElementById('statsClose').addEventListener('click', () => modal.classList.add('hidden'));
  modal.addEventListener('click', e => { if (e.target === modal || e.target.classList.contains('stats-backdrop')) modal.classList.add('hidden'); });
})();

/* =============================================================
   Boot
   ============================================================= */
(async () => {
  try {
    await ensureDB();
    const all = await idbGetAll('books');
    all.sort((a, b) => a.createdAt - b.createdAt);
    books = all;

    // 선반 배치 로드 (없으면 기존 순서 기준 3선반 균등 분배 / 옛 bookOrder도 흡수)
    let layoutRec = null;
    try { layoutRec = await idbGet('meta', 'shelfLayout'); } catch (_) {}
    if (layoutRec && Array.isArray(layoutRec.shelves) && layoutRec.shelves.length === SHELF_COUNT) {
      shelfLayout = layoutRec.shelves.map(a => Array.isArray(a) ? a.slice() : []);
    } else {
      let baseIds;
      let orderRec = null;
      try { orderRec = await idbGet('meta', 'bookOrder'); } catch (_) {}
      if (orderRec && Array.isArray(orderRec.ids)) {
        baseIds = orderRec.ids.filter(id => books.some(b => b.id === id));
        for (const b of books) if (!baseIds.includes(b.id)) baseIds.push(b.id);
      } else {
        baseIds = books.map(b => b.id);
      }
      shelfLayout = distributeShelves(baseIds, SHELF_COUNT);
    }

    // 진행률 / 본문 색인 로드
    try { const pr = await idbGet('meta', 'progress'); progressMap = (pr && pr.map) || {}; } catch (_) {}
    try { const fr = await idbGet('meta', 'fulltext'); fulltextMap = (fr && fr.map) || {}; } catch (_) {}
  } catch (err) {
    console.error('DB 초기화 실패:', err);
    showToast('⚠️ ' + (err.message || '저장소를 열 수 없습니다'));
  }
  renderBookshelf();
  setTimeout(() => { if (books.length) buildFulltextIndex(); }, 1500);   // 백그라운드 본문 색인
})();

// 창 크기 변경 시 선반을 다시 채워 폭에 맞춤 (디바운스)
let _shelfResizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_shelfResizeTimer);
  _shelfResizeTimer = setTimeout(() => { if (books.length) renderBookshelf(); }, 200);
});
